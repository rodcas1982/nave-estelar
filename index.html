<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nave Estelar 🚀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        #gameCanvas {
            display: block;
            margin: 0 auto;
            background: radial-gradient(ellipse at bottom, #1a1a3a 0%, #000000 100%);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ffcc;
            font-size: 16px;
            text-shadow: 0 0 10px #00ffcc;
        }
        #lives {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ff6b6b;
            font-size: 16px;
        }
        /* Health Bar */
        #healthBar {
            position: absolute;
            top: 40px;
            left: 10px;
            width: 120px;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.3);
        }
        #healthFill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #00ffcc);
            transition: width 0.3s ease;
        }
        /* Boss HP Bar */
        #bossHealthBar {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 16px;
            background: rgba(0,0,0,0.6);
            border-radius: 8px;
            border: 2px solid #ff0000;
            overflow: hidden;
            display: none;
            z-index: 60;
        }
        #bossHealthFill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff6600);
            transition: width 0.2s ease;
        }
        #bossLabel {
            position: absolute;
            top: 54px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff0000;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff0000;
            display: none;
            z-index: 60;
        }
        /* Level Up Banner */
        #levelBanner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffcc;
            font-size: 2em;
            font-weight: bold;
            text-shadow: 0 0 20px #00ffcc;
            display: none;
            z-index: 70;
            animation: levelPop 1.5s ease-out forwards;
            pointer-events: none;
        }
        @keyframes levelPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }
        /* Boss Warning */
        #bossWarning {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-size: 2.5em;
            font-weight: bold;
            text-shadow: 0 0 30px #ff0000;
            display: none;
            z-index: 70;
            animation: bossWarn 2s ease-out forwards;
            pointer-events: none;
        }
        @keyframes bossWarn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            70% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }
        /* Mobile Controls - always visible */
        #controls {
            display: flex;
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            justify-content: space-between;
            padding: 0 15px;
            align-items: flex-end;
            z-index: 50;
        }
        
        .movement-controls {
            display: flex;
            gap: 10px;
        }
        .control-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .control-btn:active {
            background: rgba(0,255,204,0.3);
            border-color: #00ffcc;
        }
        .shoot-btn {
            background: rgba(255,107,107,0.25);
            border-color: #ff6b6b;
            width: 75px;
            height: 75px;
            font-size: 28px;
        }
        .shoot-btn:active {
            background: rgba(255,107,107,0.5);
        }
        /* Start/Game Over Screen */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 100;
        }
        #overlay h1 {
            font-size: 2.5em;
            color: #00ffcc;
            text-shadow: 0 0 20px #00ffcc;
            margin-bottom: 20px;
        }
        #overlay button {
            padding: 15px 40px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #00ffcc, #00aa88);
            border: none;
            border-radius: 30px;
            color: #000;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        #overlay p {
            margin-top: 10px;
            opacity: 0.7;
        }
        @media (max-width: 768px) {
            #controls { display: flex; }
            #overlay h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div>Puntos: <span id="score">0</span></div>
        <div>Récord: <span id="highScore">0</span></div>
        <div>Nivel: <span id="level">1</span></div>
        <div id="healthBar">
            <div id="healthFill"></div>
        </div>
    </div>
    <div id="lives">❤️❤️❤️</div>
    <div id="bossLabel">👾 BOSS</div>
    <div id="bossHealthBar">
        <div id="bossHealthFill"></div>
    </div>
    <div id="levelBanner"></div>
    <div id="bossWarning"></div>
    
    <div id="controls">
        <div class="control-btn shoot-btn" id="shootBtn">🔥</div>
        <div class="movement-controls">
            <div class="control-btn" id="leftBtn">◀</div>
            <div class="control-btn" id="rightBtn">▶</div>
        </div>
    </div>
    
    <div id="overlay">
        <h1>🚀 Nave Estelar</h1>
        <p>Móvil: Usa los botones</p>
        <p>PC: Flechas + Espacio</p>
        <div style="margin: 20px 0;">
            <label style="color: #00ffcc; margin-right: 10px;">Nivel:</label>
            <select id="difficultySelect" onchange="setDifficulty()" style="padding: 8px 15px; border-radius: 20px; background: rgba(255,255,255,0.1); color: white; border: 1px solid #00ffcc; font-size: 14px;">
                <option value="easy">🥰 Fácil</option>
                <option value="normal" selected>⚖️ Normal</option>
                <option value="hard">💀 Difícil</option>
            </select>
        </div>
        <button onclick="startGame()">JUGAR</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Responsive canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('naveEstelarHighScore') || 0;
        let lives = 3;
        let maxLives = 3;
        let difficulty = 'normal';
        let keys = { left: false, right: false, shoot: false };
        let level = 1;
        let scoreAtLevelStart = 0;
        let powerUpActive = false;
        let powerUpTimer = 0;
        
        // Difficulty settings
        const difficultySettings = {
            easy: { spawnRate: 0.015, enemySpeed: 1.5, enemyHp: 1 },
            normal: { spawnRate: 0.025, enemySpeed: 2.5, enemyHp: 1 },
            hard: { spawnRate: 0.04, enemySpeed: 4, enemyHp: 2 }
        };
        
        // Player
        const player = {
            x: 0,
            y: 0,
            width: 40,
            height: 50,
            speed: 7,
            cooldown: 0
        };
        
        // Game objects
        let bullets = [];
        let enemies = [];
        let enemyBullets = [];
        let enemyShips = [];
        let particles = [];
        let stars = [];
        
        // === BUILDOR ADDITION: SOUND SYSTEM ===
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        
        function playSound(type) {
            if (!audioCtx) return;
            
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                const now = audioCtx.currentTime;
                
                switch(type) {
                    case 'shoot': {
                        // Laser corto y agudo
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(880, now);
                        osc.frequency.exponentialRampToValueAtTime(220, now + 0.08);
                        gain.gain.setValueAtTime(0.15, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                        osc.start(now);
                        osc.stop(now + 0.08);
                        break;
                    }
                    case 'explosion': {
                        // Ruido de explosión con decaimiento
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(150, now);
                        osc.frequency.exponentialRampToValueAtTime(30, now + 0.3);
                        gain.gain.setValueAtTime(0.25, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                        osc.start(now);
                        osc.stop(now + 0.3);
                        break;
                    }
                    case 'powerup': {
                        // Sonido ascendente satisfactorio
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(400, now);
                        osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.setValueAtTime(0.2, now + 0.15);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                        osc.start(now);
                        osc.stop(now + 0.3);
                        break;
                    }
                    case 'hit': {
                        // Impacto grave
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(200, now);
                        osc.frequency.exponentialRampToValueAtTime(60, now + 0.15);
                        gain.gain.setValueAtTime(0.3, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                        osc.start(now);
                        osc.stop(now + 0.15);
                        break;
                    }
                    case 'gameover': {
                        // Tono descendente dramático
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(440, now);
                        osc.frequency.setValueAtTime(349, now + 0.2);
                        osc.frequency.setValueAtTime(294, now + 0.4);
                        osc.frequency.setValueAtTime(220, now + 0.6);
                        gain.gain.setValueAtTime(0.3, now);
                        gain.gain.setValueAtTime(0.3, now + 0.5);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
                        osc.start(now);
                        osc.stop(now + 1.0);
                        break;
                    }
                    case 'levelup': {
                        // Fanfare ascendente
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(523, now); // C5
                        osc.frequency.setValueAtTime(659, now + 0.1); // E5
                        osc.frequency.setValueAtTime(784, now + 0.2); // G5
                        osc.frequency.setValueAtTime(1047, now + 0.3); // C6
                        gain.gain.setValueAtTime(0.25, now);
                        gain.gain.setValueAtTime(0.25, now + 0.25);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                        osc.start(now);
                        osc.stop(now + 0.5);
                        break;
                    }
                    case 'bossHit': {
                        // Impacto del boss
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(100, now);
                        osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                        osc.start(now);
                        osc.stop(now + 0.1);
                        break;
                    }
                    case 'bossDeath': {
                        // Explosión grande y dramática
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(200, now);
                        osc.frequency.exponentialRampToValueAtTime(20, now + 0.8);
                        gain.gain.setValueAtTime(0.35, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                        osc.start(now);
                        osc.stop(now + 0.8);
                        break;
                    }
                }
            } catch(e) {
                // Silently fail if audio doesn't work
            }
        }
        // === END SOUND SYSTEM ===
        
        // === BUILDOR ADDITION: BOSS SYSTEM ===
        let boss = null;
        let bossActive = false;
        let bossBulletTimer = 0;
        let bossShootInterval = 40;
        
        class Boss {
            constructor() {
                this.x = canvas.width / 2;
                this.y = -120;
                this.width = 130;
                this.height = 90;
                this.hp = 100 + (level * 50);
                this.maxHp = this.hp;
                this.speed = 2;
                this.direction = 1;
                this.targetY = 80;
                this.phase = 'entering'; // entering, fighting, defeated
                this.enterSpeed = 2;
            }
            
            update() {
                if (this.phase === 'entering') {
                    this.y += this.enterSpeed;
                    if (this.y >= this.targetY) {
                        this.y = this.targetY;
                        this.phase = 'fighting';
                    }
                    return;
                }
                
                if (this.phase === 'fighting') {
                    // Movimiento horizontal con rebote
                    this.x += this.speed * this.direction;
                    if (this.x <= 80) {
                        this.direction = 1;
                    }
                    if (this.x >= canvas.width - 80) {
                        this.direction = -1;
                    }
                    
                    // Movimiento vertical sutil
                    if (Math.random() < 0.02) {
                        this.targetY = 60 + Math.random() * 60;
                    }
                    if (this.y < this.targetY) this.y += 0.5;
                    if (this.y > this.targetY) this.y -= 0.5;
                }
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Cuerpo principal del boss (forma amenazante)
                ctx.fillStyle = '#8b0000';
                ctx.beginPath();
                ctx.moveTo(0, -this.height/2);
                ctx.lineTo(-this.width/2, this.height/2 - 15);
                ctx.lineTo(-this.width/3, this.height/2);
                ctx.lineTo(0, this.height/2 - 10);
                ctx.lineTo(this.width/3, this.height/2);
                ctx.lineTo(this.width/2, this.height/2 - 15);
                ctx.closePath();
                ctx.fill();
                
                // Detalle central oscuro
                ctx.fillStyle = '#5a0000';
                ctx.beginPath();
                ctx.moveTo(0, -this.height/2 + 10);
                ctx.lineTo(-this.width/3, this.height/2 - 20);
                ctx.lineTo(0, this.height/2 - 15);
                ctx.lineTo(this.width/3, this.height/2 - 20);
                ctx.closePath();
                ctx.fill();
                
                // Ojos (puntos rojos brillantes)
                ctx.fillStyle = '#ff0000';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(-25, -10, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(25, -10, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // Cañón central
                ctx.fillStyle = '#444';
                ctx.fillRect(-8, this.height/2 - 20, 16, 25);
                ctx.fillStyle = '#ff3300';
                ctx.beginPath();
                ctx.arc(0, this.height/2 + 5, 6, 0, Math.PI * 2);
                ctx.fill();
                
                // Engines (parte superior)
                ctx.fillStyle = '#660000';
                ctx.fillRect(-55, -10, 20, 30);
                ctx.fillRect(35, -10, 20, 30);
                
                // Glow de engines
                ctx.fillStyle = '#ff4400';
                ctx.shadowColor = '#ff4400';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(-45, 20, 7, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(45, 20, 7, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                ctx.restore();
                
                // HP Bar del boss
                if (this.phase === 'fighting') {
                    const barWidth = 140;
                    const barHeight = 14;
                    const barX = this.x - barWidth/2;
                    const barY = this.y - this.height/2 - 25;
                    
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(barX - 2, barY - 2, barWidth + 4, barHeight + 4);
                    
                    ctx.fillStyle = '#333';
                    ctx.fillRect(barX, barY, barWidth, barHeight);
                    
                    const hpPercent = (this.hp / this.maxHp) * barWidth;
                    const gradient = ctx.createLinearGradient(barX, 0, barX + barWidth, 0);
                    gradient.addColorStop(0, '#ff0000');
                    gradient.addColorStop(1, '#ff6600');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(barX, barY, hpPercent, barHeight);
                    
                    // Texto HP
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 10px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(`${Math.ceil(this.hp)} / ${this.maxHp}`, this.x, barY + barHeight - 2);
                }
            }
            
            shoot() {
                if (this.phase !== 'fighting') return;
                // Triple disparo
                enemyBullets.push({ x: this.x - 30, y: this.y + this.height/2 + 10, speed: 7, size: 8 });
                enemyBullets.push({ x: this.x, y: this.y + this.height/2 + 15, speed: 8, size: 10 });
                enemyBullets.push({ x: this.x + 30, y: this.y + this.height/2 + 10, speed: 7, size: 8 });
            }
        }
        
        function spawnBoss() {
            boss = new Boss();
            bossActive = true;
            showBossWarning();
            document.getElementById('bossLabel').style.display = 'block';
            document.getElementById('bossHealthBar').style.display = 'block';
        }
        
        function defeatBoss() {
            if (!boss) return;
            
            playSound('bossDeath');
            
            // Explosiones múltiples
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    if (boss) {
                        createExplosion(
                            boss.x + (Math.random() - 0.5) * 80,
                            boss.y + (Math.random() - 0.5) * 60,
                            '#ff6600'
                        );
                    }
                }, i * 150);
            }
            
            // Gran puntuación
            const bossPoints = 1000 * level;
            score += bossPoints;
            
            // Power-up gratis para el jugador
            setTimeout(() => {
                powerUpActive = true;
                powerUpTimer = 600; // 10 segundos
                playSound('powerup');
            }, 800);
            
            boss = null;
            bossActive = false;
            
            document.getElementById('bossLabel').style.display = 'none';
            document.getElementById('bossHealthBar').style.display = 'none';
            
            showMessage(`+${bossPoints} pts!`, '#00ffcc');
        }
        
        function showBossWarning() {
            const el = document.getElementById('bossWarning');
            el.textContent = '⚠️ ¡BOSS! ⚠️';
            el.style.display = 'block';
            el.style.animation = 'none';
            el.offsetHeight; // Reflow
            el.style.animation = 'bossWarn 2s ease-out forwards';
            setTimeout(() => { el.style.display = 'none'; }, 2000);
        }
        
        function showLevelUp() {
            playSound('levelup');
            const el = document.getElementById('levelBanner');
            el.textContent = `⬆️ NIVEL ${level}`;
            el.style.display = 'block';
            el.style.animation = 'none';
            el.offsetHeight; // Reflow
            el.style.animation = 'levelPop 1.5s ease-out forwards';
            setTimeout(() => { el.style.display = 'none'; }, 1500);
        }
        
        function showMessage(text, color) {
            const el = document.getElementById('levelBanner');
            el.textContent = text;
            el.style.color = color || '#00ffcc';
            el.style.display = 'block';
            el.style.animation = 'none';
            el.offsetHeight;
            el.style.animation = 'levelPop 1.5s ease-out forwards';
            setTimeout(() => { el.style.display = 'none'; }, 1500);
        }
        // === END BOSS SYSTEM ===
        
        // Initialize stars
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 2 + 0.5
            });
        }
        
        // Input handling
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
            if (e.key === ' ') keys.shoot = true;
        });
        
        document.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
            if (e.key === ' ') keys.shoot = false;
        });
        
        function showMobileControls() {
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            if (isTouchDevice) {
                document.getElementById('controls').style.display = 'flex';
            }
        }
        
        showMobileControls();
        
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                resizeCanvas();
                showMobileControls();
                player.y = canvas.height - 80;
            }, 100);
        });
        
        document.addEventListener('touchstart', showMobileControls, { once: false });
        
        // Touch controls
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const shootBtn = document.getElementById('shootBtn');
        
        leftBtn.addEventListener('touchstart', () => keys.left = true);
        leftBtn.addEventListener('touchend', () => keys.left = false);
        rightBtn.addEventListener('touchstart', () => keys.right = true);
        rightBtn.addEventListener('touchend', () => keys.right = false);
        shootBtn.addEventListener('touchstart', () => keys.shoot = true);
        shootBtn.addEventListener('touchend', () => keys.shoot = false);
        
        function resetGame() {
            player.x = canvas.width / 2;
            player.y = canvas.height - 80;
            bullets = [];
            enemyBullets = [];
            enemies = [];
            enemyShips = [];
            particles = [];
            boss = null;
            bossActive = false;
            level = 1;
            score = 0;
            scoreAtLevelStart = 0;
            lives = 3;
            powerUpActive = false;
            powerUpTimer = 0;
            document.getElementById('bossLabel').style.display = 'none';
            document.getElementById('bossHealthBar').style.display = 'none';
            updateUI();
        }
        
        function startGame() {
            initAudio();
            document.getElementById('overlay').style.display = 'none';
            resetGame();
            gameRunning = true;
            gameLoop();
        }
        
        function gameOver() {
            gameRunning = false;
            playSound('gameover');
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('naveEstelarHighScore', highScore);
            }
            document.getElementById('bossLabel').style.display = 'none';
            document.getElementById('bossHealthBar').style.display = 'none';
            document.getElementById('overlay').style.display = 'flex';
            document.querySelector('#overlay h1').textContent = '💀 Game Over';
            document.querySelector('#overlay button').textContent = 'REINTENTAR';
        }
        
        function setDifficulty() {
            difficulty = document.getElementById('difficultySelect').value;
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('lives').textContent = '❤️'.repeat(lives);
            document.getElementById('level').textContent = level;
            const healthPercent = (lives / maxLives) * 100;
            document.getElementById('healthFill').style.width = healthPercent + '%';
            
            // Boss HP bar
            if (boss) {
                const bossHpPercent = (boss.hp / boss.maxHp) * 100;
                document.getElementById('bossHealthFill').style.width = bossHpPercent + '%';
            }
        }
        
        function checkLevelUp() {
            const scoreForLevel = scoreAtLevelStart + level * 2000;
            if (score >= scoreForLevel && score > 0) {
                level++;
                scoreAtLevelStart = score;
                showLevelUp();
            }
        }
        
        function spawnEnemy() {
            // No spawnear enemigos normales si hay boss activo
            if (bossActive) return;
            
            const settings = difficultySettings[difficulty];
            
            if (Math.random() < settings.spawnRate + score / 80000) {
                enemies.push({
                    x: Math.random() * (canvas.width - 40),
                    y: -30,
                    width: 30 + Math.random() * 20,
                    height: 30 + Math.random() * 20,
                    speed: settings.enemySpeed + Math.random() * 1.5 + score / 15000,
                    hp: settings.enemyHp + Math.floor(score / 8000),
                    type: 'asteroid'
                });
            }
            
            if (score > 500 && Math.random() < 0.005 + score / 200000) {
                enemyShips.push({
                    x: Math.random() * (canvas.width - 40),
                    y: -40,
                    width: 35,
                    height: 45,
                    speed: settings.enemySpeed * 0.7,
                    hp: 2,
                    cooldown: 60,
                    type: 'ship'
                });
            }
        }
        
        function createExplosion(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 30,
                    color: color || '#ff6b6b'
                });
            }
        }
        
        function update() {
            if (!gameRunning) return;
            
            // === Player movement ===
            if (keys.left && player.x > player.width/2) player.x -= player.speed;
            if (keys.right && player.x < canvas.width - player.width/2) player.x += player.speed;
            
            // === Shooting ===
            if (player.cooldown > 0) player.cooldown--;
            if (keys.shoot && player.cooldown === 0) {
                // Power-up: doble disparo
                if (powerUpActive) {
                    bullets.push({ x: player.x - 10, y: player.y - 25, speed: 12 });
                    bullets.push({ x: player.x + 10, y: player.y - 25, speed: 12 });
                } else {
                    bullets.push({ x: player.x, y: player.y - 25, speed: 10 });
                }
                playSound('shoot');
                player.cooldown = powerUpActive ? 8 : 15;
            }
            
            // === Power-up timer ===
            if (powerUpActive) {
                powerUpTimer--;
                if (powerUpTimer <= 0) {
                    powerUpActive = false;
                }
            }
            
            // === Update bullets ===
            bullets = bullets.filter(b => {
                b.y -= b.speed;
                return b.y > -10;
            });
            
            // === Boss logic ===
            if (bossActive && boss) {
                boss.update();
                
                // Boss shooting
                bossBulletTimer++;
                if (bossBulletTimer >= bossShootInterval) {
                    boss.shoot();
                    bossBulletTimer = 0;
                }
                
                // Check bullets hitting boss
                let bulletsToRemove = [];
                bullets.forEach((b, bi) => {
                    if (Math.abs(b.x - boss.x) < boss.width/2 + 5 &&
                        b.y > boss.y - boss.height/2 &&
                        b.y < boss.y + boss.height/2) {
                        boss.hp -= (powerUpActive ? 3 : 1);
                        bulletsToRemove.push(bi);
                        createExplosion(b.x, b.y, '#ff6600');
                        playSound('bossHit');
                        
                        if (boss.hp <= 0) {
                            defeatBoss();
                        }
                    }
                });
                bullets = bullets.filter((_, i) => !bulletsToRemove.includes(i));
            }
            
            // === Spawn enemies ===
            spawnEnemy();
            
            // === Level up check ===
            checkLevelUp();
            
            // === Boss trigger: every 5 levels ===
            if (!bossActive && enemies.length === 0 && enemyShips.length === 0 && level % 5 === 0 && level > 0) {
                spawnBoss();
            }
            
            // === Enemy collisions ===
            let enemiesToRemove = [];
            let bulletsToRemove = [];
            
            enemies.forEach((e, ei) => {
                e.y += e.speed;
                
                bullets.forEach((b, bi) => {
                    const hitDistX = Math.abs(b.x - e.x);
                    const hitDistY = Math.abs(b.y - e.y);
                    
                    if (hitDistX < e.width/2 + 5 && hitDistY < e.height/2 + 10) {
                        e.hp--;
                        if (!bulletsToRemove.includes(bi)) bulletsToRemove.push(bi);
                        if (e.hp <= 0) {
                            score += 100;
                            createExplosion(e.x, e.y, '#00ffcc');
                            if (!enemiesToRemove.includes(ei)) enemiesToRemove.push(ei);
                            playSound('explosion');
                        }
                    }
                });
                
                if (Math.abs(player.x - e.x) < (player.width + e.width)/2 - 5 && 
                    Math.abs(player.y - e.y) < (player.height + e.height)/2 - 5) {
                    lives--;
                    createExplosion(player.x, player.y, '#ff6b6b');
                    if (!enemiesToRemove.includes(ei)) enemiesToRemove.push(ei);
                    playSound('hit');
                    if (lives <= 0) gameOver();
                }
            });
            
            enemies = enemies.filter((_, i) => !enemiesToRemove.includes(i));
            bullets = bullets.filter((_, i) => !bulletsToRemove.includes(i));
            
            // === Enemy ships ===
            let enemyShipsToRemove = [];
            enemyShips.forEach((ship, si) => {
                ship.y += ship.speed;
                
                if (ship.cooldown > 0) ship.cooldown--;
                if (ship.cooldown === 0 && ship.y > 50) {
                    enemyBullets.push({ x: ship.x, y: ship.y + 20, speed: 6, size: 5 });
                    ship.cooldown = 80;
                }
                
                bullets.forEach((b, bi) => {
                    const hitDistX = Math.abs(b.x - ship.x);
                    const hitDistY = Math.abs(b.y - ship.y);
                    if (hitDistX < ship.width/2 + 5 && hitDistY < ship.height/2 + 10) {
                        ship.hp--;
                        if (!bulletsToRemove.includes(bi)) bulletsToRemove.push(bi);
                        if (ship.hp <= 0) {
                            score += 250;
                            createExplosion(ship.x, ship.y, '#ff0000');
                            if (!enemyShipsToRemove.includes(si)) enemyShipsToRemove.push(si);
                            playSound('explosion');
                        }
                    }
                });
                
                if (Math.abs(player.x - ship.x) < (player.width + ship.width)/2 - 5 && 
                    Math.abs(player.y - ship.y) < (player.height + ship.height)/2 - 5) {
                    lives--;
                    createExplosion(player.x, player.y, '#ff6b6b');
                    if (!enemyShipsToRemove.includes(si)) enemyShipsToRemove.push(si);
                    playSound('hit');
                    if (lives <= 0) gameOver();
                }
            });
            enemyShips = enemyShips.filter((_, i) => !enemyShipsToRemove.includes(i));
            
            // === Enemy bullets ===
            let playerHit = false;
            enemyBullets = enemyBullets.filter(b => {
                b.y += b.speed;
                
                if (Math.abs(b.x - player.x) < player.width/2 && 
                    Math.abs(b.y - player.y) < player.height/2) {
                    lives--;
                    createExplosion(player.x, player.y, '#ff6b6b');
                    playerHit = true;
                    playSound('hit');
                    return false;
                }
                
                return b.y < canvas.height + 10;
            });
            
            if (playerHit && lives <= 0) gameOver();
            
            enemies = enemies.filter(e => e.y < canvas.height + 50);
            
            // === Particles ===
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                return p.life > 0;
            });
            
            updateUI();
        }
        
        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Stars
            ctx.fillStyle = 'white';
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.y += star.speed;
                if (star.y > canvas.height) star.y = 0;
            });
            
            // === Draw Boss ===
            if (boss) boss.draw();
            
            // Player
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Power-up glow
            if (powerUpActive) {
                ctx.shadowColor = '#00ffcc';
                ctx.shadowBlur = 20;
            }
            
            ctx.fillStyle = '#00ffcc';
            ctx.beginPath();
            ctx.moveTo(0, -25);
            ctx.lineTo(-20, 25);
            ctx.lineTo(0, 15);
            ctx.lineTo(20, 25);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Engine flame
            ctx.fillStyle = powerUpActive ? '#00ffcc' : '#ff6b6b';
            ctx.beginPath();
            ctx.moveTo(-8, 20);
            ctx.lineTo(0, 35 + Math.random() * 10);
            ctx.lineTo(8, 20);
            ctx.fill();
            
            ctx.fillStyle = '#00aaff';
            ctx.beginPath();
            ctx.ellipse(0, 0, 6, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
            
            // Bullets
            ctx.fillStyle = powerUpActive ? '#00ffcc' : '#ffff00';
            bullets.forEach(b => {
                ctx.fillRect(b.x - 3, b.y - 10, 6, 20);
            });
            
            // Enemies
            enemies.forEach(e => {
                ctx.save();
                ctx.translate(e.x, e.y);
                
                ctx.fillStyle = '#8b4513';
                ctx.beginPath();
                ctx.arc(0, 0, e.width/2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#654321';
                ctx.beginPath();
                ctx.arc(-e.width/5, -e.height/5, e.width/6, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(e.width/6, e.height/6, e.width/8, 0, Math.PI * 2);
                ctx.fill();
                
                if (e.hp > 1) {
                    ctx.fillStyle = 'white';
                    ctx.font = '12px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('❤️'.repeat(e.hp), 0, 5);
                }
                
                ctx.restore();
            });
            
            // Enemy ships
            enemyShips.forEach(ship => {
                ctx.save();
                ctx.translate(ship.x, ship.y);
                
                ctx.fillStyle = '#ff3333';
                ctx.beginPath();
                ctx.moveTo(0, 25);
                ctx.lineTo(-18, -20);
                ctx.lineTo(0, -10);
                ctx.lineTo(18, -20);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#ff6600';
                ctx.beginPath();
                ctx.moveTo(-7, -18);
                ctx.lineTo(0, -30 - Math.random() * 8);
                ctx.lineTo(7, -18);
                ctx.fill();
                
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.ellipse(0, 0, 5, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            });
            
            // Enemy bullets
            ctx.fillStyle = '#ff4444';
            enemyBullets.forEach(b => {
                const sz = b.size || 5;
                ctx.beginPath();
                ctx.arc(b.x, b.y, sz, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
            });
            ctx.globalAlpha = 1;
        }
        
        function gameLoop() {
            if (gameRunning) {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }
        }
        
        updateUI();
    </script>
</body>
</html>
