<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Nave Estelar 🚀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        #gameCanvas {
            display: block;
            margin: 0 auto;
            background: radial-gradient(ellipse at bottom, #1a1a3a 0%, #000000 100%);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ffcc;
            font-size: 16px;
            text-shadow: 0 0 10px #00ffcc;
        }
        #lives {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ff6b6b;
            font-size: 16px;
        }
        /* Mobile Controls - always show on touch devices */
        #controls {
            display: flex;
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            justify-content: space-between;
            padding: 0 15px;
            align-items: flex-end;
            z-index: 50;
        }
        
        /* Hide on desktop */
        @media (hover: hover) and (pointer: fine) {
            #controls {
                display: none;
            }
        }
        .movement-controls {
            display: flex;
            gap: 10px;
        }
        .control-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .control-btn:active {
            background: rgba(0,255,204,0.3);
            border-color: #00ffcc;
        }
        .shoot-btn {
            background: rgba(255,107,107,0.25);
            border-color: #ff6b6b;
            width: 75px;
            height: 75px;
            font-size: 28px;
        }
        .shoot-btn:active {
            background: rgba(255,107,107,0.5);
        }
        /* Start/Game Over Screen */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 100;
        }
        #overlay h1 {
            font-size: 2.5em;
            color: #00ffcc;
            text-shadow: 0 0 20px #00ffcc;
            margin-bottom: 20px;
        }
        #overlay button {
            padding: 15px 40px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #00ffcc, #00aa88);
            border: none;
            border-radius: 30px;
            color: #000;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        #overlay p {
            margin-top: 10px;
            opacity: 0.7;
        }
        @media (max-width: 768px) {
            #controls { display: flex; }
            #overlay h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div>Puntos: <span id="score">0</span></div>
        <div>Récord: <span id="highScore">0</span></div>
    </div>
    <div id="lives">❤️❤️❤️</div>
    
    <div id="controls">
        <div class="control-btn shoot-btn" id="shootBtn">🔥</div>
        <div class="movement-controls">
            <div class="control-btn" id="leftBtn">◀</div>
            <div class="control-btn" id="rightBtn">▶</div>
        </div>
    </div>
    
    <div id="overlay">
        <h1>🚀 Nave Estelar</h1>
        <p>Móvil: Usa los botones</p>
        <p>PC: Flechas + Espacio</p>
        <div style="margin: 20px 0;">
            <label style="color: #00ffcc; margin-right: 10px;">Nivel:</label>
            <select id="difficultySelect" onchange="setDifficulty()" style="padding: 8px 15px; border-radius: 20px; background: rgba(255,255,255,0.1); color: white; border: 1px solid #00ffcc; font-size: 14px;">
                <option value="easy">🥰 Fácil</option>
                <option value="normal" selected>⚖️ Normal</option>
                <option value="hard">💀 Difícil</option>
            </select>
        </div>
        <button onclick="startGame()">JUGAR</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Responsive canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('naveEstelarHighScore') || 0;
        let lives = 3;
        let difficulty = 'normal';
        let keys = { left: false, right: false, shoot: false };
        
        // Difficulty settings
        const difficultySettings = {
            easy: { spawnRate: 0.015, enemySpeed: 1.5, enemyHp: 1 },
            normal: { spawnRate: 0.025, enemySpeed: 2.5, enemyHp: 1 },
            hard: { spawnRate: 0.04, enemySpeed: 4, enemyHp: 2 }
        };
        
        // Player
        const player = {
            x: 0,
            y: 0,
            width: 40,
            height: 50,
            speed: 7,
            cooldown: 0
        };
        
        // Game objects
        let bullets = [];
        let enemies = [];
        let particles = [];
        let stars = [];
        
        // Initialize stars
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 2 + 0.5
            });
        }
        
        // Input handling
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
            if (e.key === ' ') keys.shoot = true;
        });
        
        document.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
            if (e.key === ' ') keys.shoot = false;
        });
        
        // Show controls on touch devices and orientation change
        function showMobileControls() {
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            if (isTouchDevice) {
                document.getElementById('controls').style.display = 'flex';
            }
        }
        
        // Initial check
        showMobileControls();
        
        // Show controls on orientation change
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                resizeCanvas();
                showMobileControls();
                // Reposition player if needed
                player.y = canvas.height - 80;
            }, 100);
        });
        
        // Also show on any touch interaction
        document.addEventListener('touchstart', showMobileControls, { once: false });
        
        // Touch controls
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const shootBtn = document.getElementById('shootBtn');
        
        leftBtn.addEventListener('touchstart', () => keys.left = true);
        leftBtn.addEventListener('touchend', () => keys.left = false);
        rightBtn.addEventListener('touchstart', () => keys.right = true);
        rightBtn.addEventListener('touchend', () => keys.right = false);
        shootBtn.addEventListener('touchstart', () => keys.shoot = true);
        shootBtn.addEventListener('touchend', () => keys.shoot = false);
        
        function resetGame() {
            player.x = canvas.width / 2;
            player.y = canvas.height - 80;
            bullets = [];
            enemies = [];
            particles = [];
            score = 0;
            lives = 3;
            updateUI();
        }
        
        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            resetGame();
            gameRunning = true;
            gameLoop();
        }
        
        function gameOver() {
            gameRunning = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('naveEstelarHighScore', highScore);
            }
            document.getElementById('overlay').style.display = 'flex';
            document.querySelector('#overlay h1').textContent = '💀 Game Over';
            document.querySelector('#overlay button').textContent = 'REINTENTAR';
        }
        
        function setDifficulty() {
            difficulty = document.getElementById('difficultySelect').value;
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('lives').textContent = '❤️'.repeat(lives);
        }
        
        function spawnEnemy() {
            const settings = difficultySettings[difficulty];
            if (Math.random() < settings.spawnRate + score / 80000) {
                enemies.push({
                    x: Math.random() * (canvas.width - 40),
                    y: -30,
                    width: 30 + Math.random() * 20,
                    height: 30 + Math.random() * 20,
                    speed: settings.enemySpeed + Math.random() * 1.5 + score / 15000,
                    hp: settings.enemyHp + Math.floor(score / 8000)
                });
            }
        }
        
        function createExplosion(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 30,
                    color: color || '#ff6b6b'
                });
            }
        }
        
        function update() {
            if (!gameRunning) return;
            
            // Player movement
            if (keys.left && player.x > player.width/2) player.x -= player.speed;
            if (keys.right && player.x < canvas.width - player.width/2) player.x += player.speed;
            
            // Shooting
            if (player.cooldown > 0) player.cooldown--;
            if (keys.shoot && player.cooldown === 0) {
                bullets.push({ x: player.x, y: player.y - 25, speed: 10 });
                player.cooldown = 15;
            }
            
            // Update bullets
            bullets = bullets.filter(b => {
                b.y -= b.speed;
                return b.y > -10;
            });
            
            // Spawn new enemies
            spawnEnemy();
            
            // Check collisions - separate from enemy update
            let enemiesToRemove = [];
            let bulletsToRemove = [];
            
            enemies.forEach((e, ei) => {
                e.y += e.speed;
                
                bullets.forEach((b, bi) => {
                    // More forgiving hitbox for bullets
                    const hitDistX = Math.abs(b.x - e.x);
                    const hitDistY = Math.abs(b.y - e.y);
                    
                    if (hitDistX < e.width/2 + 5 && hitDistY < e.height/2 + 10) {
                        e.hp--;
                        bulletsToRemove.push(bi);
                        if (e.hp <= 0) {
                            score += 100;
                            createExplosion(e.x, e.y, '#00ffcc');
                            enemiesToRemove.push(ei);
                        }
                    }
                });
                
                // Collision with player
                if (Math.abs(player.x - e.x) < (player.width + e.width)/2 - 5 && 
                    Math.abs(player.y - e.y) < (player.height + e.height)/2 - 5) {
                    lives--;
                    createExplosion(player.x, player.y, '#ff6b6b');
                    enemiesToRemove.push(ei);
                    if (lives <= 0) gameOver();
                }
            });
            
            // Remove dead enemies and used bullets
            enemies = enemies.filter((_, i) => !enemiesToRemove.includes(i));
            bullets = bullets.filter((_, i) => !bulletsToRemove.includes(i));
            
            // Remove enemies that went off screen
            enemies = enemies.filter(e => e.y < canvas.height + 50);
            
            // Update particles
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                return p.life > 0;
            });
            
            updateUI();
        }
        
        function draw() {
            // Clear and draw background
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw stars
            ctx.fillStyle = 'white';
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.y += star.speed;
                if (star.y > canvas.height) star.y = 0;
            });
            
            // Draw player (spaceship)
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Ship body
            ctx.fillStyle = '#00ffcc';
            ctx.beginPath();
            ctx.moveTo(0, -25);
            ctx.lineTo(-20, 25);
            ctx.lineTo(0, 15);
            ctx.lineTo(20, 25);
            ctx.closePath();
            ctx.fill();
            
            // Engine flame
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.moveTo(-8, 20);
            ctx.lineTo(0, 35 + Math.random() * 10);
            ctx.lineTo(8, 20);
            ctx.fill();
            
            // Cockpit
            ctx.fillStyle = '#00aaff';
            ctx.beginPath();
            ctx.ellipse(0, 0, 6, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
            
            // Draw bullets
            ctx.fillStyle = '#ffff00';
            bullets.forEach(b => {
                ctx.fillRect(b.x - 3, b.y - 10, 6, 20);
            });
            
            // Draw enemies
            enemies.forEach(e => {
                ctx.save();
                ctx.translate(e.x, e.y);
                
                // Asteroid body
                ctx.fillStyle = '#8b4513';
                ctx.beginPath();
                ctx.arc(0, 0, e.width/2, 0, Math.PI * 2);
                ctx.fill();
                
                // Craters
                ctx.fillStyle = '#654321';
                ctx.beginPath();
                ctx.arc(-e.width/5, -e.height/5, e.width/6, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(e.width/6, e.height/6, e.width/8, 0, Math.PI * 2);
                ctx.fill();
                
                // Health indicator
                if (e.hp > 1) {
                    ctx.fillStyle = 'white';
                    ctx.font = '12px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('❤️'.repeat(e.hp), 0, 5);
                }
                
                ctx.restore();
            });
            
            // Draw particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
            });
            ctx.globalAlpha = 1;
        }
        
        function gameLoop() {
            if (gameRunning) {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }
        }
        
        // Initialize
        updateUI();
    </script>
</body>
</html>
