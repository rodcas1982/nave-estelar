<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nave Estelar 🚀</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        body {
            background: #050510;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
        }
        #gameCanvas {
            display: block;
            margin: 0 auto;
        }
        
        /* UI Elements */
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #00ffcc;
            font-size: 14px;
            text-shadow: 0 0 10px #00ffcc;
            z-index: 10;
        }
        #ui div {
            margin-bottom: 5px;
        }
        #lives {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #ff6b6b;
            font-size: 14px;
            text-shadow: 0 0 10px #ff6b6b;
        }
        #healthBar {
            position: absolute;
            top: 45px;
            left: 15px;
            width: 100px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(0,255,204,0.3);
        }
        #healthFill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #00ffcc);
            transition: width 0.3s ease;
        }
        #powerUpIndicator {
            position: absolute;
            top: 70px;
            left: 15px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .powerUp-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            animation: pulse 0.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* Mobile Controls */
        /* Touch controls - Split screen (left/right) */
        #touchControls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 40;
            display: none;
        }
        
        /* Visual zones */
        .touch-zone-indicator {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45%;
            height: 60%;
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            color: rgba(255,255,255,0.15);
            pointer-events: none;
            transition: all 0.2s;
        }
        .touch-zone-indicator.left {
            left: 2%;
        }
        .touch-zone-indicator.right {
            right: 2%;
        }
        .touch-zone-indicator.active {
            background: rgba(0,255,204,0.1);
            border-color: rgba(0,255,204,0.5);
            color: rgba(0,255,204,0.5);
        }
        
        /* Show on mobile */
        @media (max-width: 768px), (pointer: coarse) {
            #touchControls { display: block; }
            #controls { display: none; }
        }
        
        /* Overlay */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(5,5,20,0.95) 0%, rgba(10,10,40,0.98) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 100;
        }
        #overlay h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #00ffcc, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin-bottom: 10px;
            animation: glow 2s infinite;
        }
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(0,255,204,0.5)); }
            50% { filter: drop-shadow(0 0 40px rgba(255,107,107,0.5)); }
        }
        #overlay .subtitle {
            font-size: 1.2em;
            color: #aaa;
            margin-bottom: 30px;
        }
        #overlay button {
            padding: 15px 50px;
            font-size: 1.1em;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #00ffcc, #00aa88);
            border: none;
            border-radius: 30px;
            color: #000;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
            transition: all 0.3s;
        }
        #overlay button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0,255,204,0.5);
        }
        #overlay .difficulty {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        #overlay .difficulty button {
            padding: 10px 25px;
            font-size: 0.9em;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
        }
        #overlay .difficulty button.selected {
            border-color: #00ffcc;
            background: rgba(0,255,204,0.2);
        }
        
        /* Achievements */
        #achievements {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .achievement {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.3s;
        }
        .achievement.unlocked {
            background: linear-gradient(135deg, #ffd93d, #ff6b6b);
            border-color: #ffd93d;
            animation: achievementPop 0.5s;
        }
        @keyframes achievementPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        /* Combo */
        #combo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            color: #ffd93d;
            text-shadow: 0 0 30px #ffd93d;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }
        
        /* Game Over Stats */
        #gameStats {
            text-align: center;
            margin: 20px 0;
        }
        #gameStats div {
            margin: 10px 0;
            font-size: 1.1em;
        }
        #gameStats .stat-label {
            color: #888;
        }
        #gameStats .stat-value {
            color: #00ffcc;
        }
        
        @media (max-width: 768px), (pointer: coarse) {
            #controls { display: none; }
            #touchControls { display: block; }
            #overlay h1 { font-size: 2em; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div>PUNTOS: <span id="score">0</span></div>
        <div>RÉCORD: <span id="highScore">0</span></div>
    </div>
    <div id="lives">❤️❤️❤️</div>
    <div id="healthBar"><div id="healthFill"></div></div>
    
    <div id="powerUpIndicator"></div>
    <div id="achievements"></div>
    <div id="combo"></div>
    
    <div id="controls">
        <div class="movement-controls">
            <button class="control-btn" id="leftBtn">◀</button>
            <button class="control-btn" id="rightBtn">▶</button>
        </div>
        <button class="control-btn shoot-btn" id="shootBtn">🔥</button>
    </div>

    <!-- New intuitive touch controls - split screen -->
    <div id="touchControls">
        <div class="touch-zone-indicator left" id="zoneLeft">◀ IZQUIERDA</div>
        <div class="touch-zone-indicator right" id="zoneRight">DERECHA ▶<br><span style="font-size:0.5em">TAP = 💥</span></div>
    </div>

    <div id="overlay">
        <h1>🚀 NAVE ESTELAR</h1>
        <p class="subtitle">Space Shooter Ultra</p>
        <div class="difficulty">
            <button onclick="startGame('easy')">FÁCIL</button>
            <button class="selected" onclick="startGame('normal')">NORMAL</button>
            <button onclick="startGame('hard')">DIFÍCIL</button>
        </div>
        <button onclick="startGame()">🚀 INICIAR</button>
        <div id="gameStats" style="display:none;">
            <div><span class="stat-label">Puntos:</span> <span class="stat-value" id="finalScore">0</span></div>
            <div><span class="stat-label">Nivel:</span> <span class="stat-value" id="finalLevel">1</span></div>
            <div><span class="stat-label">Kills:</span> <span class="stat-value" id="finalKills">0</span></div>
        </div>
        <p style="margin-top:30px;opacity:0.5;font-size:0.8em;">
            🖥️ PC: Flechas + Espacio | 📱 Móvil: Botones
        </p>
    </div>

    <script>
    // ============ GAME CONFIG ============
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Responsive canvas
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Game State
    let gameRunning = false;
    let score = 0;
    let highScore = localStorage.getItem('naveEstelarHighScore') || 0;
    let lives = 999; // 🌀 MODO DIOS ACTIVADO
    let health = 100;
    let godMode = true; // 🌀 INVENCIBLE
    let level = 1;
    let difficulty = 'normal';
    let kills = 0;
    let combo = 0;
    let comboTimer = 0;
    
    // Power-ups
    let activePowerUps = {
        shield: 0,
        doubleShot: 0,
        rapidFire: 0,
        speed: 0
    };
    
    // Achievements
    const achievements = [
        { id: 'firstKill', name: 'Primera Muerte', icon: '🎯', unlocked: false },
        { id: 'combo5', name: 'Combo x5', icon: '🔥', unlocked: false },
        { id: 'combo10', name: 'Combo x10', icon: '💥', unlocked: false },
        { id: 'score1000', name: '1000 Puntos', icon: '⭐', unlocked: false },
        { id: 'score5000', name: '5000 Puntos', icon: '🌟', unlocked: false },
        { id: 'noDamage', name: 'Sin Daño', icon: '🛡️', unlocked: false }
    ];
    
    // Game Objects
    let player = null;
    let bullets = [];
    let enemies = [];
    let particles = [];
    let powerUps = [];
    let stars = [];
    let enemyBullets = [];
    
    // Controls
    let keys = {};
    let touchLeft = false;
    let touchRight = false;
    let touchShoot = false;
    
    // Difficulty settings
    const difficultySettings = {
        easy: { enemySpeed: 2, spawnRate: 1500, enemyHealth: 1 },
        normal: { enemySpeed: 3.5, spawnRate: 1000, enemyHealth: 1 },
        hard: { enemySpeed: 5, spawnRate: 600, enemyHealth: 2 }
    };
    
    // ============ INITIALIZE STARS ============
    function initStars() {
        stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 2 + 0.5,
                brightness: Math.random()
            });
        }
    }
    
    // ============ PLAYER CLASS ============
    class Player {
        constructor() {
            this.x = canvas.width / 2;
            this.y = canvas.height - 100;
            this.width = 50;
            this.height = 60;
            this.speed = 7;
            this.shootDelay = 0;
            this.invincible = 0;
        }
        
        update() {
            // Movement
            if (keys['ArrowLeft'] || keys['a'] || touchLeft) {
                this.x -= this.speed + (activePowerUps.speed > 0 ? 3 : 0);
            }
            if (keys['ArrowRight'] || keys['d'] || touchRight) {
                this.x += this.speed + (activePowerUps.speed > 0 ? 3 : 0);
            }
            
            // Boundaries
            this.x = Math.max(this.width/2, Math.min(canvas.width - this.width/2, this.x));
            
            // Shooting
            if ((keys[' '] || touchShoot) && this.shootDelay <= 0) {
                this.shoot();
                this.shootDelay = activePowerUps.rapidFire > 0 ? 5 : 15;
            }
            if (this.shootDelay > 0) this.shootDelay--;
            
            // Invincibility
            if (this.invincible > 0) this.invincible--;
            
            // Power-up timers
            for (let p in activePowerUps) {
                if (activePowerUps[p] > 0) activePowerUps[p]--;
            }
        }
        
        shoot() {
            bullets.push(new Bullet(this.x, this.y - 20));
            if (activePowerUps.doubleShot > 0) {
                bullets.push(new Bullet(this.x - 15, this.y - 10));
                bullets.push(new Bullet(this.x + 15, this.y - 10));
            }
        }
        
        draw() {
            ctx.save();
            
            // Shield effect
            if (activePowerUps.shield > 0) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 45, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(0, 255, 204, ${0.3 + Math.sin(Date.now() / 100) * 0.2})`;
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.fillStyle = 'rgba(0, 255, 204, 0.1)';
                ctx.fill();
            }
            
            // Invincibility flicker
            if (this.invincible > 0 && Math.floor(this.invincible / 5) % 2 === 0) {
                ctx.globalAlpha = 0.5;
            }
            
            // Ship body
            ctx.fillStyle = '#00ffcc';
            ctx.beginPath();
            ctx.moveTo(this.x, this.y - 30);
            ctx.lineTo(this.x - 25, this.y + 25);
            ctx.lineTo(this.x, this.y + 10);
            ctx.lineTo(this.x + 25, this.y + 25);
            ctx.closePath();
            ctx.fill();
            
            // Cockpit
            ctx.fillStyle = '#ffd93d';
            ctx.beginPath();
            ctx.arc(this.x, this.y - 5, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // Engine glow
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.moveTo(this.x - 8, this.y + 25);
            ctx.lineTo(this.x, this.y + 35 + Math.random() * 10);
            ctx.lineTo(this.x + 8, this.y + 25);
            ctx.fill();
            
            ctx.restore();
        }
        
        hit(damage) {
            if (this.invincible > 0 || activePowerUps.shield > 0 || godMode) return;
            
            health -= damage;
            createParticles(this.x, this.y, 20, '#ff6b6b');
            
            if (health <= 0) {
                lives--;
                if (lives > 0) {
                    health = 100;
                    this.invincible = 120;
                    checkAchievement('noDamage');
                } else {
                    gameOver();
                }
            }
            updateUI();
        }
    }
    
    // ============ BULLET CLASS ============
    class Bullet {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.speed = 12;
            this.radius = 4;
        }
        
        update() {
            this.y -= this.speed;
        }
        
        draw() {
            ctx.fillStyle = '#00ffcc';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffcc';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }
    
    // ============ ENEMY CLASS ============
    class Enemy {
        constructor() {
            this.x = Math.random() * (canvas.width - 40) + 20;
            this.y = -40;
            this.width = 40;
            this.height = 40;
            this.speed = difficultySettings[difficulty].enemySpeed + Math.random();
            this.health = difficultySettings[difficulty].enemyHealth;
            this.type = Math.random() > 0.7 ? 'fighter' : 'asteroid';
            this.shootTimer = Math.random() * 100;
        }
        
        update() {
            this.y += this.speed;
            
            // Fighter ships shoot
            if (this.type === 'fighter') {
                this.shootTimer--;
                if (this.shootTimer <= 0) {
                    enemyBullets.push(new EnemyBullet(this.x, this.y + 20));
                    this.shootTimer = 100 + Math.random() * 100;
                }
            }
        }
        
        draw() {
            ctx.save();
            
            if (this.type === 'asteroid') {
                // Asteroid
                ctx.fillStyle = '#666';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 20, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#555';
                ctx.beginPath();
                ctx.arc(this.x - 5, this.y - 5, 8, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Fighter ship
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + 20);
                ctx.lineTo(this.x - 20, this.y - 15);
                ctx.lineTo(this.x, this.y - 5);
                ctx.lineTo(this.x + 20, this.y - 15);
                ctx.closePath();
                ctx.fill();
                
                // Engine
                ctx.fillStyle = '#ff8800';
                ctx.beginPath();
                ctx.arc(this.x, this.y - 20, 5, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
        }
    }
    
    // ============ ENEMY BULLET ============
    class EnemyBullet {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.speed = 5;
        }
        
        update() {
            this.y += this.speed;
        }
        
        draw() {
            ctx.fillStyle = '#ff4444';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff4444';
            ctx.beginPath();
            ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }
    
    // ============ PARTICLE CLASS ============
    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 10;
            this.vy = (Math.random() - 0.5) * 10;
            this.life = 1;
            this.decay = 0.02 + Math.random() * 0.02;
            this.color = color;
            this.size = Math.random() * 4 + 2;
        }
        
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= this.decay;
            this.vx *= 0.98;
            this.vy *= 0.98;
        }
        
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }
    
    // ============ POWER-UP CLASS ============
    class PowerUp {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.types = ['shield', 'doubleShot', 'rapidFire', 'speed'];
            this.type = this.types[Math.floor(Math.random() * this.types.length)];
            this.speed = 2;
            this.size = 25;
        }
        
        update() {
            this.y += this.speed;
        }
        
        draw() {
            const colors = {
                shield: '#00ffcc',
                doubleShot: '#ffd93d',
                rapidFire: '#ff6b6b',
                speed: '#a855f7'
            };
            const icons = {
                shield: '🛡️',
                doubleShot: '⚡',
                rapidFire: '🔥',
                speed: '💨'
            };
            
            ctx.save();
            ctx.fillStyle = colors[this.type];
            ctx.shadowBlur = 20;
            ctx.shadowColor = colors[this.type];
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(icons[this.type], this.x, this.y + 6);
            ctx.restore();
        }
    }
    
    // ============ CREATE PARTICLES ============
    function createParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
            particles.push(new Particle(x, y, color));
        }
    }
    
    // ============ SPAWN ENEMY ============
    let spawnTimer = 0;
    function spawnEnemy() {
        spawnTimer--;
        if (spawnTimer <= 0) {
            enemies.push(new Enemy());
            spawnTimer = difficultySettings[difficulty].spawnRate / 16.67;
        }
    }
    
    // ============ UPDATE UI ============
    function updateUI() {
        document.getElementById('score').textContent = score;
        document.getElementById('highScore').textContent = highScore;
        document.getElementById('lives').textContent = '❤️'.repeat(lives);
        document.getElementById('healthFill').style.width = health + '%';
        
        // Power-up indicators
        const indicator = document.getElementById('powerUpIndicator');
        indicator.innerHTML = '';
        if (activePowerUps.shield > 0) {
            indicator.innerHTML += '<div class="powerUp-icon" style="background:#00ffcc">🛡️</div>';
        }
        if (activePowerUps.doubleShot > 0) {
            indicator.innerHTML += '<div class="powerUp-icon" style="background:#ffd93d">⚡</div>';
        }
        if (activePowerUps.rapidFire > 0) {
            indicator.innerHTML += '<div class="powerUp-icon" style="background:#ff6b6b">🔥</div>';
        }
        
        // Update achievements display
        const achDiv = document.getElementById('achievements');
        achDiv.innerHTML = '';
        achievements.forEach(a => {
            achDiv.innerHTML += `<div class="achievement ${a.unlocked ? 'unlocked' : ''}" title="${a.name}">${a.icon}</div>`;
        });
    }
    
    // ============ CHECK ACHIEVEMENTS ============
    function checkAchievement(id) {
        const ach = achievements.find(a => a.id === id);
        if (ach && !ach.unlocked) {
            ach.unlocked = true;
            updateUI();
        }
    }
    
    // ============ SHOW COMBO ============
    function showCombo(count) {
        const comboDiv = document.getElementById('combo');
        if (count >= 5) {
            comboDiv.textContent = `COMBO x${count}!`;
            comboDiv.style.opacity = 1;
            comboDiv.style.animation = 'pulse 0.3s';
            setTimeout(() => {
                comboDiv.style.opacity = 0;
            }, 500);
        }
    }
    
    // ============ GAME OVER ============
    function gameOver() {
        gameRunning = false;
        
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('naveEstelarHighScore', highScore);
        }
        
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('gameStats').style.display = 'block';
        document.getElementById('finalScore').textContent = score;
        document.getElementById('finalLevel').textContent = level;
        document.getElementById('finalKills').textContent = kills;
        
        // Reset achievements for new game
        achievements.forEach(a => a.unlocked = false);
    }
    
    // ============ START GAME ============
    function startGame(diff = 'normal') {
        difficulty = diff;
        score = 0;
        lives = 3;
        health = 100;
        level = 1;
        kills = 0;
        combo = 0;
        
        player = new Player();
        bullets = [];
        enemies = [];
        particles = [];
        powerUps = [];
        enemyBullets = [];
        
        activePowerUps = { shield: 0, doubleShot: 0, rapidFire: 0, speed: 0 };
        
        initStars();
        
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('gameStats').style.display = 'none';
        
        gameRunning = true;
        gameLoop();
    }
    
    // ============ GAME LOOP ============
    function gameLoop() {
        if (!gameRunning) return;
        
        // Clear
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Draw stars
        stars.forEach(star => {
            star.y += star.speed;
            if (star.y > canvas.height) {
                star.y = 0;
                star.x = Math.random() * canvas.width;
            }
            ctx.fillStyle = `rgba(255,255,255,${star.brightness})`;
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fill();
        });
        
        // Update player
        player.update();
        player.draw();
        
        // Spawn enemies
        spawnEnemy();
        
        // Update bullets
        bullets = bullets.filter(b => b.y > -20);
        bullets.forEach(b => {
            b.update();
            b.draw();
        });
        
        // Update enemies
        enemies = enemies.filter(e => e.y < canvas.height + 50);
        enemies.forEach(e => {
            e.update();
            e.draw();
            
            // Collision with player
            if (Math.abs(e.x - player.x) < 30 && Math.abs(e.y - player.y) < 30) {
                player.hit(30);
                e.health = 0;
            }
        });
        
        // Collision detection
        bullets.forEach((b, bi) => {
            enemies.forEach((e, ei) => {
                if (Math.abs(b.x - e.x) < 25 && Math.abs(b.y - e.y) < 25) {
                    e.health--;
                    bullets.splice(bi, 1);
                    createParticles(b.x, b.y, 5, '#00ffcc');
                    
                    if (e.health <= 0) {
                        // Enemy destroyed
                        createParticles(e.x, e.y, 15, e.type === 'asteroid' ? '#666' : '#ff4444');
                        
                        // Score
                        const points = e.type === 'fighter' ? 250 : 100;
                        score += points;
                        kills++;
                        
                        // Combo
                        combo++;
                        comboTimer = 60;
                        if (combo >= 5) showCombo(combo);
                        
                        // Check achievements
                        if (kills === 1) checkAchievement('firstKill');
                        if (combo >= 5) checkAchievement('combo5');
                        if (combo >= 10) checkAchievement('combo10');
                        if (score >= 1000) checkAchievement('score1000');
                        if (score >= 5000) checkAchievement('score5000');
                        
                        // Drop power-up
                        if (Math.random() < 0.1) {
                            powerUps.push(new PowerUp(e.x, e.y));
                        }
                        
                        enemies.splice(ei, 1);
                        
                        // Level up
                        if (score > level * 2000) {
                            level++;
                        }
                    }
                }
            });
        });
        
        // Update enemy bullets
        enemyBullets = enemyBullets.filter(b => b.y < canvas.height + 20);
        enemyBullets.forEach(b => {
            b.update();
            b.draw();
            
            // Collision with player
            if (Math.abs(b.x - player.x) < 20 && Math.abs(b.y - player.y) < 20) {
                player.hit(15);
                enemyBullets.splice(enemyBullets.indexOf(b), 1);
            }
        });
        
        // Update power-ups
        powerUps = powerUps.filter(p => p.y < canvas.height + 30);
        powerUps.forEach(p => {
            p.update();
            p.draw();
            
            // Collision with player
            if (Math.abs(p.x - player.x) < 35 && Math.abs(p.y - player.y) < 35) {
                activePowerUps[p.type] = 300; // 5 seconds
                powerUps.splice(powerUps.indexOf(p), 1);
                score += 50;
            }
        });
        
        // Update particles
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        
        // Combo timer
        if (comboTimer > 0) {
            comboTimer--;
        } else {
            combo = 0;
        }
        
        // Update UI
        updateUI();
        
        requestAnimationFrame(gameLoop);
    }
    
    // ============ CONTROLS ============
    document.addEventListener('keydown', e => {
        keys[e.key] = true;
    });
    document.addEventListener('keyup', e => {
        keys[e.key] = false;
    });
    
    // New intuitive touch controls - split screen: left/right move, tap to shoot
    const touchControls = document.getElementById('touchControls');
    let leftTouch = null;
    let rightTouch = null;
    let isLeftTouching = false;
    let isRightTouching = false;
    let lastTap = 0;
    
    // Show touch controls on mobile
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
        document.getElementById('controls').style.display = 'none';
    }
    
    // Touch start
    const zoneLeftEl = document.getElementById('zoneLeft');
    const zoneRightEl = document.getElementById('zoneRight');
    
    touchControls.addEventListener('touchstart', (e) => {
        e.preventDefault();
        
        for (let touch of e.touches) {
            const x = touch.clientX;
            const screenWidth = window.innerWidth;
            
            if (x < screenWidth / 2) {
                leftTouch = touch.identifier;
                isLeftTouching = true;
                zoneLeftEl.classList.add('active');
            } else {
                rightTouch = touch.identifier;
                isRightTouching = true;
                zoneRightEl.classList.add('active');
            }
        }
    });
    
    // Touch move
    touchControls.addEventListener('touchmove', (e) => {
        e.preventDefault();
        
        isLeftTouching = false;
        isRightTouching = false;
        
        for (let touch of e.changedTouches) {
            const x = touch.clientX;
            const screenWidth = window.innerWidth;
            
            if (x < screenWidth / 2) {
                isLeftTouching = true;
            } else {
                isRightTouching = true;
            }
        }
    });
    
    // Touch end
    touchControls.addEventListener('touchend', (e) => {
        e.preventDefault();
        
        for (let touch of e.changedTouches) {
            const x = touch.clientX;
            const screenWidth = window.innerWidth;
            
            if (x < screenWidth / 2) {
                leftTouch = null;
                isLeftTouching = false;
                zoneLeftEl.classList.remove('active');
            } else {
                rightTouch = null;
                isRightTouching = false;
                zoneRightEl.classList.remove('active');
                
                // Single tap on right side = shoot
                touchShoot = true;
                setTimeout(() => touchShoot = false, 150);
            }
        }
    });
    
    touchControls.addEventListener('touchcancel', (e) => {
        isLeftTouching = false;
        isRightTouching = false;
        touchShoot = false;
        zoneLeftEl.classList.remove('active');
        zoneRightEl.classList.remove('active');
    });
    
    // Update player to follow touch zones
    const originalPlayerUpdate = Player.prototype.update;
    Player.prototype.update = function() {
        // Touch control
        if (isLeftTouching) {
            this.x -= this.speed + (activePowerUps.speed > 0 ? 3 : 0);
        }
        if (isRightTouching) {
            this.x += this.speed + (activePowerUps.speed > 0 ? 3 : 0);
        }
        
        // Boundaries
        this.x = Math.max(this.width/2, Math.min(canvas.width - this.width/2, this.x));
        
        // Shooting
        if ((keys[' '] || touchShoot) && this.shootDelay <= 0) {
            this.shoot();
            this.shootDelay = activePowerUps.rapidFire > 0 ? 5 : 15;
        }
        if (this.shootDelay > 0) this.shootDelay--;
        
        // Invincibility
        if (this.invincible > 0) this.invincible--;
        
        // Power-up timers
        for (let p in activePowerUps) {
            if (activePowerUps[p] > 0) activePowerUps[p]--;
        }
    };
    
    // Legacy button controls (for non-touch devices)
    document.getElementById('leftBtn').addEventListener('touchstart', () => touchLeft = true);
    document.getElementById('leftBtn').addEventListener('touchend', () => touchLeft = false);
    document.getElementById('rightBtn').addEventListener('touchstart', () => touchRight = true);
    document.getElementById('rightBtn').addEventListener('touchend', () => touchRight = false);
    document.getElementById('shootBtn').addEventListener('touchstart', () => touchShoot = true);
    document.getElementById('shootBtn').addEventListener('touchend', () => touchShoot = false);
    
    // Initialize
    initStars();
    updateUI();
    </script>
</body>
</html>
