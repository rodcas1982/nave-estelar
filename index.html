<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nave Estelar 🚀</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        body {
            background: #050510;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
        }
        #gameCanvas {
            display: block;
            margin: 0 auto;
        }
        
        /* UI Elements */
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #00ffcc;
            font-size: 14px;
            text-shadow: 0 0 10px #00ffcc;
            z-index: 10;
        }
        #ui div {
            margin-bottom: 5px;
        }
        #lives {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #ff6b6b;
            font-size: 14px;
            text-shadow: 0 0 10px #ff6b6b;
        }
        #healthBar {
            position: absolute;
            top: 45px;
            left: 15px;
            width: 100px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(0,255,204,0.3);
        }
        #healthFill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #00ffcc);
            transition: width 0.3s ease;
        }
        #powerUpIndicator {
            position: absolute;
            top: 70px;
            left: 15px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .powerUp-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            animation: pulse 0.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* Mobile Controls */
        #controls {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            justify-content: space-between;
            padding: 0 20px;
            align-items: flex-end;
            z-index: 50;
        }
        .movement-controls {
            display: flex;
            gap: 12px;
        }
        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(0,255,204,0.4);
            color: #00ffcc;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            backdrop-filter: blur(5px);
        }
        .control-btn:active {
            background: rgba(0,255,204,0.4);
            transform: scale(0.95);
        }
        .shoot-btn {
            background: rgba(255,107,107,0.2);
            border-color: #ff6b6b;
            width: 70px;
            height: 70px;
            font-size: 24px;
        }
        .shoot-btn:active {
            background: rgba(255,107,107,0.5);
        }
        
        /* Overlay */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(5,5,20,0.95) 0%, rgba(10,10,40,0.98) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 100;
        }
        #overlay h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #00ffcc, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin-bottom: 10px;
            animation: glow 2s infinite;
        }
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(0,255,204,0.5)); }
            50% { filter: drop-shadow(0 0 40px rgba(255,107,107,0.5)); }
        }
        #overlay .subtitle {
            font-size: 1.2em;
            color: #aaa;
            margin-bottom: 30px;
        }
        #overlay button {
            padding: 15px 50px;
            font-size: 1.1em;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #00ffcc, #00aa88);
            border: none;
            border-radius: 30px;
            color: #000;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
            transition: all 0.3s;
        }
        #overlay button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0,255,204,0.5);
        }
        #overlay .difficulty {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        #overlay .difficulty button {
            padding: 10px 25px;
            font-size: 0.9em;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
        }
        #overlay .difficulty button.selected {
            border-color: #00ffcc;
            background: rgba(0,255,204,0.2);
        }
        
        /* Achievements */
        #achievements {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .achievement {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.3s;
        }
        .achievement.unlocked {
            background: linear-gradient(135deg, #ffd93d, #ff6b6b);
            border-color: #ffd93d;
            animation: achievementPop 0.5s;
        }
        @keyframes achievementPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        /* Combo */
        #combo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            color: #ffd93d;
            text-shadow: 0 0 30px #ffd93d;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }
        
        /* Game Over Stats */
        #gameStats {
            text-align: center;
            margin: 20px 0;
        }
        #gameStats div {
            margin: 10px 0;
            font-size: 1.1em;
        }
        #gameStats .stat-label {
            color: #888;
        }
        #gameStats .stat-value {
            color: #00ffcc;
        }
        
        @media (max-width: 768px) {
            #controls { display: flex; }
            #overlay h1 { font-size: 2em; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div>PUNTOS: <span id="score">0</span></div>
        <div>RÉCORD: <span id="highScore">0</span></div>
    </div>
    <div id="lives">❤️❤️❤️</div>
    <div id="healthBar"><div id="healthFill"></div></div>
    <div id="bossHealthBar" style="display:none; position:absolute; bottom:80px; left:50%; transform:translateX(-50%); z-index:15;"></div>
    
    <div id="powerUpIndicator"></div>
    <div id="achievements"></div>
    <div id="combo"></div>
    
    <div id="controls">
        <div class="movement-controls">
            <button class="control-btn" id="leftBtn">◀</button>
            <button class="control-btn" id="rightBtn">▶</button>
        </div>
        <button class="control-btn shoot-btn" id="shootBtn">🔥</button>
    </div>

    <div id="overlay">
        <h1>🚀 NAVE ESTELAR</h1>
        <p class="subtitle">Space Shooter Ultra</p>
        <div class="difficulty">
            <button onclick="selectDifficulty('easy')">FÁCIL</button>
            <button class="selected" id="btn-normal" onclick="selectDifficulty('normal')">NORMAL</button>
            <button onclick="selectDifficulty('hard')">DIFÍCIL</button>
        </div>
        <button onclick="startGame(difficulty)">🚀 INICIAR</button>
        <div id="gameStats" style="display:none;">
            <div><span class="stat-label">Puntos:</span> <span class="stat-value" id="finalScore">0</span></div>
            <div><span class="stat-label">Nivel:</span> <span class="stat-value" id="finalLevel">1</span></div>
            <div><span class="stat-label">Kills:</span> <span class="stat-value" id="finalKills">0</span></div>
        </div>
        <p style="margin-top:30px;opacity:0.5;font-size:0.8em;">
            🖥️ PC: Flechas + Espacio | 📱 Móvil: Botones
        </p>
    </div>

    <script>
    // ============ GAME CONFIG ============
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Responsive canvas
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Game State
    let gameRunning = false;
    let gamePaused = false;
    let score = 0;
    let _uiCache = { score: -1, highScore: -1, lives: -1, health: -1, powerUps: '' };
    let highScore = localStorage.getItem('naveEstelarHighScore') || 0;
    let lives = 3;
    let health = 100;
    let level = 1;
    let difficulty = 'normal';
    let kills = 0;
    let combo = 0;
    let comboTimer = 0;
    let shakeFrames = 0;
    let shakeIntensity = 0;

    // Power-ups
    let activePowerUps = {
        shield: 0,
        doubleShot: 0,
        rapidFire: 0,
        speed: 0
    };
    
    // Achievements
    const achievements = [
        { id: 'firstKill', name: 'Primera Muerte', icon: '🎯', unlocked: false },
        { id: 'combo5', name: 'Combo x5', icon: '🔥', unlocked: false },
        { id: 'combo10', name: 'Combo x10', icon: '💥', unlocked: false },
        { id: 'score1000', name: '1000 Puntos', icon: '⭐', unlocked: false },
        { id: 'score5000', name: '5000 Puntos', icon: '🌟', unlocked: false },
        { id: 'noDamage', name: 'Sin Daño', icon: '🛡️', unlocked: false }
    ];
    
    // Game Objects
    let player = null;
    let bullets = [];
    let enemies = [];
    let particles = [];
    let powerUps = [];
    let stars = [];
    let enemyBullets = [];
    let boss = null;

    // Explosion effects array
    let explosions = [];
    let floatingTexts = [];

    // Background parallax
    let bgOffset = 0;
    
    // ============ ASSET PRELOADING ============
    // Preload images for game assets (fallback to canvas drawing if not available)
    const assets = {};
    function preloadAssets(callback) {
        const assetList = [
            { name: 'logo', src: 'assets/logo.png' },
            { name: 'background', src: 'assets/background_space.png' },
            { name: 'explosion', src: 'assets/explosion.png' },
            { name: 'shield', src: 'assets/powerup_shield.png' },
            { name: 'doubleShot', src: 'assets/powerup_doubleshot.png' },
            { name: 'speed', src: 'assets/powerup_speed.png' },
            { name: 'life', src: 'assets/powerup_life.png' }
        ];
        let loaded = 0;
        assetList.forEach(item => {
            const img = new Image();
            img.onload = () => {
                assets[item.name] = img;
                loaded++;
                if (loaded === assetList.length) callback();
            };
            img.onerror = () => {
                // Asset failed to load, will use canvas fallback
                assets[item.name] = null;
                loaded++;
                if (loaded === assetList.length) callback();
            };
            img.src = item.src;
        });
    }
    
    // ============ SOUND SYSTEM (Web Audio API) ============
    let audioCtx = null;
    
    function initAudio() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
            console.warn('Web Audio API not supported');
        }
    }
    
    function playSound(type) {
        if (!audioCtx) return;
        try {
            // Resume context if suspended (autoplay policy)
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            switch (type) {
                case 'shoot':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(880, now);
                    osc.frequency.exponentialRampToValueAtTime(220, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;
                    
                case 'explosion':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(30, now + 0.3);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    // Add noise burst
                    const noise = audioCtx.createBufferSource();
                    const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
                    const data = noiseBuffer.getChannelData(0);
                    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
                    noise.buffer = noiseBuffer;
                    const noiseGain = audioCtx.createGain();
                    noise.connect(noiseGain);
                    noiseGain.connect(audioCtx.destination);
                    noiseGain.gain.setValueAtTime(0.15, now);
                    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    noise.start(now);
                    break;
                    
                case 'powerup':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.setValueAtTime(660, now + 0.1);
                    osc.frequency.setValueAtTime(880, now + 0.2);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
                    osc.start(now);
                    osc.stop(now + 0.35);
                    break;
                    
                case 'hit':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(80, now + 0.15);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                    break;
                    
                case 'gameover':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.setValueAtTime(330, now + 0.3);
                    osc.frequency.setValueAtTime(220, now + 0.6);
                    osc.frequency.setValueAtTime(110, now + 0.9);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                    osc.start(now);
                    osc.stop(now + 1.2);
                    break;
                    
                case 'bossDefeat':
                    // Victory fanfare
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(523, now);
                    osc.frequency.setValueAtTime(659, now + 0.15);
                    osc.frequency.setValueAtTime(784, now + 0.3);
                    osc.frequency.setValueAtTime(1047, now + 0.45);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.setValueAtTime(0.15, now + 0.5);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                    osc.start(now);
                    osc.stop(now + 0.8);
                    break;
            }
        } catch (e) {
            console.warn('Sound playback error:', e);
        }
    }
    
    // Controls
    let keys = {};
    let touchLeft = false;
    let touchRight = false;
    let touchShoot = false;
    
    // Difficulty settings
    const difficultySettings = {
        easy: { enemySpeed: 2, spawnRate: 1500, enemyHealth: 1 },
        normal: { enemySpeed: 3.5, spawnRate: 1000, enemyHealth: 1 },
        hard: { enemySpeed: 5, spawnRate: 600, enemyHealth: 2 }
    };
    
    // ============ SCREEN SHAKE ============
    function screenShake(intensity, duration) {
        shakeFrames = duration;
        shakeIntensity = intensity;
    }

    // ============ INITIALIZE STARS ============
    function initStars() {
        stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 2 + 0.5,
                brightness: Math.random(),
                colorIndex: Math.floor(Math.random() * 4)
            });
        }
    }
    
    // ============ PLAYER CLASS ============
    class Player {
        constructor() {
            this.x = canvas.width / 2;
            this.y = canvas.height - 100;
            this.width = 50;
            this.height = 60;
            this.speed = 7;
            this.shootDelay = 0;
            this.invincible = 0;
        }
        
        update() {
            // Movement
            if (keys['ArrowLeft'] || keys['a'] || touchLeft) {
                this.x -= this.speed + (activePowerUps.speed > 0 ? 3 : 0);
            }
            if (keys['ArrowRight'] || keys['d'] || touchRight) {
                this.x += this.speed + (activePowerUps.speed > 0 ? 3 : 0);
            }
            
            // Boundaries
            this.x = Math.max(this.width/2, Math.min(canvas.width - this.width/2, this.x));
            
            // Shooting
            if ((keys[' '] || touchShoot) && this.shootDelay <= 0) {
                this.shoot();
                this.shootDelay = activePowerUps.rapidFire > 0 ? 5 : 15;
            }
            if (this.shootDelay > 0) this.shootDelay--;
            
            // Invincibility
            if (this.invincible > 0) this.invincible--;
            
            // Power-up timers
            for (let p in activePowerUps) {
                if (activePowerUps[p] > 0) activePowerUps[p]--;
            }
        }
        
        shoot() {
            bullets.push(new Bullet(this.x, this.y - 20));
            if (activePowerUps.doubleShot > 0) {
                bullets.push(new Bullet(this.x - 15, this.y - 10));
                bullets.push(new Bullet(this.x + 15, this.y - 10));
            }
            playSound('shoot');
        }
        
        draw() {
            ctx.save();

            // Shield effect
            if (activePowerUps.shield > 0) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 45, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(0, 255, 204, ${0.3 + Math.sin(Date.now() / 100) * 0.2})`;
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.fillStyle = 'rgba(0, 255, 204, 0.1)';
                ctx.fill();
            }

            // Invincibility flicker
            if (this.invincible > 0 && Math.floor(this.invincible / 5) % 2 === 0) {
                ctx.globalAlpha = 0.5;
            }

            // === PLAYER SHIP ===
            {
                const t = Date.now();

                // Dual engine flames
                for (const ex of [-6, 6]) {
                    const flameH = 14 + Math.sin(t * 0.12 + ex) * 5;
                    const fg = ctx.createLinearGradient(this.x + ex, this.y + 28, this.x + ex, this.y + 28 + flameH);
                    fg.addColorStop(0, 'rgba(255,255,220,1)');
                    fg.addColorStop(0.35, 'rgba(80,200,255,0.85)');
                    fg.addColorStop(1, 'rgba(0,80,255,0)');
                    ctx.fillStyle = fg;
                    ctx.beginPath();
                    ctx.ellipse(this.x + ex, this.y + 30, 3.5, flameH, 0, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.shadowBlur = 12;
                ctx.shadowColor = '#00ccff';

                // Main body
                const bodyGrad = ctx.createLinearGradient(this.x, this.y - 30, this.x, this.y + 28);
                bodyGrad.addColorStop(0, '#aaf4ff');
                bodyGrad.addColorStop(0.4, '#00ccee');
                bodyGrad.addColorStop(1, '#004477');
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - 30);
                ctx.lineTo(this.x - 6, this.y - 6);
                ctx.lineTo(this.x - 26, this.y + 18);
                ctx.lineTo(this.x - 10, this.y + 14);
                ctx.lineTo(this.x - 8, this.y + 28);
                ctx.lineTo(this.x + 8, this.y + 28);
                ctx.lineTo(this.x + 10, this.y + 14);
                ctx.lineTo(this.x + 26, this.y + 18);
                ctx.lineTo(this.x + 6, this.y - 6);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#00ffee';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Wing accent lines
                ctx.strokeStyle = 'rgba(0,255,238,0.35)';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(this.x - 6, this.y + 2); ctx.lineTo(this.x - 22, this.y + 16); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(this.x + 6, this.y + 2); ctx.lineTo(this.x + 22, this.y + 16); ctx.stroke();

                // Cockpit dome
                const cpg = ctx.createRadialGradient(this.x - 2, this.y - 14, 1, this.x, this.y - 10, 9);
                cpg.addColorStop(0, '#ffffff');
                cpg.addColorStop(0.5, '#88ddff');
                cpg.addColorStop(1, '#002266');
                ctx.fillStyle = cpg;
                ctx.beginPath();
                ctx.ellipse(this.x, this.y - 10, 7, 10, 0, 0, Math.PI * 2);
                ctx.fill();

                // Hull center stripe
                ctx.fillStyle = 'rgba(0,255,220,0.15)';
                ctx.beginPath();
                ctx.moveTo(this.x - 3, this.y - 2);
                ctx.lineTo(this.x + 3, this.y - 2);
                ctx.lineTo(this.x + 5, this.y + 27);
                ctx.lineTo(this.x - 5, this.y + 27);
                ctx.closePath();
                ctx.fill();

                ctx.shadowBlur = 0;
            }

            ctx.restore();
        }
        
        hit(damage) {
            if (this.invincible > 0 || activePowerUps.shield > 0) return;
            
            health -= damage;
            createParticles(this.x, this.y, 20, '#ff6b6b');
            playSound('hit');
            screenShake(10, 15);

            if (health <= 0) {
                lives--;
                if (lives > 0) {
                    health = 100;
                    this.invincible = 120;
                    checkAchievement('noDamage');
                } else {
                    gameOver();
                }
            }
            updateUI();
        }
    }
    
    // ============ BULLET CLASS ============
    class Bullet {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.speed = 12;
            this.radius = 4;
        }
        
        update() {
            this.y -= this.speed;
        }
        
        draw() {
            ctx.save();
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#00ffcc';
            // Trail
            const grad = ctx.createLinearGradient(this.x, this.y + 14, this.x, this.y - 8);
            grad.addColorStop(0, 'rgba(0,255,204,0)');
            grad.addColorStop(1, 'rgba(0,255,204,0.8)');
            ctx.fillStyle = grad;
            ctx.fillRect(this.x - 2, this.y, 4, 14);
            // Core
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(this.x - 1.5, this.y - 8, 3, 10);
            ctx.restore();
        }
    }
    
    // ============ ENEMY CLASS ============
    class Enemy {
        constructor() {
            this.x = Math.random() * (canvas.width - 40) + 20;
            this.y = -40;
            this.width = 40;
            this.height = 40;
            this.speed = difficultySettings[difficulty].enemySpeed + Math.random();
            this.health = difficultySettings[difficulty].enemyHealth;
            this.type = Math.random() > 0.7 ? 'fighter' : 'asteroid';
            this.shootTimer = Math.random() * 100;
            const roll = Math.random();
            this.pattern = roll < 0.5 ? 'straight' : roll < 0.75 ? 'sine' : 'diagonal';
            this.angle = 0;
            this.moveDir = Math.random() < 0.5 ? 1 : -1;
        }
        
        update() {
            this.y += this.speed;

            if (this.pattern === 'sine') {
                this.angle += 0.05;
                this.x += Math.sin(this.angle) * 2.5;
            } else if (this.pattern === 'diagonal') {
                this.x += this.moveDir * 2;
                if (this.x < 20 || this.x > canvas.width - 20) this.moveDir *= -1;
            }

            // Fighter ships shoot
            if (this.type === 'fighter') {
                this.shootTimer--;
                if (this.shootTimer <= 0) {
                    enemyBullets.push(new EnemyBullet(this.x, this.y + 20));
                    this.shootTimer = 100 + Math.random() * 100;
                }
            }
        }
        
        draw() {
            ctx.save();

            if (this.type === 'asteroid') {
                // === ASTEROID ===
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(Date.now() * 0.0008 + this.x * 0.05);
                const rg = ctx.createRadialGradient(-4, -4, 2, 0, 0, 20);
                rg.addColorStop(0, '#999990');
                rg.addColorStop(0.5, '#666660');
                rg.addColorStop(1, '#3a3a35');
                ctx.fillStyle = rg;
                const pts = [[0,-20],[11,-14],[19,-4],[17,9],[9,18],[-3,20],[-14,13],[-20,2],[-17,-9],[-9,-18]];
                ctx.beginPath();
                ctx.moveTo(pts[0][0], pts[0][1]);
                for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = 'rgba(180,180,160,0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();
                // Craters
                ctx.fillStyle = 'rgba(0,0,0,0.35)';
                ctx.beginPath(); ctx.arc(-6, -5, 5, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(7, 5, 3, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(-1, 11, 2, 0, Math.PI * 2); ctx.fill();
                // Highlight
                ctx.fillStyle = 'rgba(220,220,200,0.12)';
                ctx.beginPath(); ctx.arc(-8, -8, 7, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            } else {
                // === ENEMY FIGHTER ===
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#ff2200';
                const bodyGrad = ctx.createLinearGradient(this.x, this.y - 20, this.x, this.y + 22);
                bodyGrad.addColorStop(0, '#881100');
                bodyGrad.addColorStop(0.45, '#ff3300');
                bodyGrad.addColorStop(1, '#660000');
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + 22);
                ctx.lineTo(this.x - 5, this.y + 4);
                ctx.lineTo(this.x - 22, this.y - 12);
                ctx.lineTo(this.x - 8, this.y - 7);
                ctx.lineTo(this.x - 5, this.y - 20);
                ctx.lineTo(this.x + 5, this.y - 20);
                ctx.lineTo(this.x + 8, this.y - 7);
                ctx.lineTo(this.x + 22, this.y - 12);
                ctx.lineTo(this.x + 5, this.y + 4);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#ff5533';
                ctx.lineWidth = 1;
                ctx.stroke();
                // Wing lines
                ctx.strokeStyle = 'rgba(255,100,0,0.45)';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(this.x - 5, this.y - 4); ctx.lineTo(this.x - 18, this.y - 11); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(this.x + 5, this.y - 4); ctx.lineTo(this.x + 18, this.y - 11); ctx.stroke();
                // Core glow
                const cg = ctx.createRadialGradient(this.x, this.y - 3, 1, this.x, this.y - 3, 8);
                cg.addColorStop(0, '#ffffff');
                cg.addColorStop(0.4, '#ff8844');
                cg.addColorStop(1, 'rgba(255,0,0,0)');
                ctx.fillStyle = cg;
                ctx.beginPath(); ctx.arc(this.x, this.y - 3, 8, 0, Math.PI * 2); ctx.fill();
                // Engine top glow
                const eg = ctx.createRadialGradient(this.x, this.y - 20, 0, this.x, this.y - 20, 7);
                eg.addColorStop(0, 'rgba(255,160,0,0.9)');
                eg.addColorStop(1, 'rgba(255,0,0,0)');
                ctx.fillStyle = eg;
                ctx.beginPath(); ctx.arc(this.x, this.y - 20, 7, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
            }

            ctx.restore();
        }
    }
    
    // ============ ENEMY BULLET ============
    class EnemyBullet {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.speed = 5;
        }
        
        update() {
            this.y += this.speed;
        }
        
        draw() {
            ctx.fillStyle = '#ff4444';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff4444';
            ctx.beginPath();
            ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }
    
    // ============ BOSS CLASS ============
    class Boss {
        constructor(level) {
            this.x = canvas.width / 2;
            this.y = -120;
            this.targetY = 120;
            this.width = 120;
            this.height = 100;
            this.maxHealth = 500 + level * 200;
            this.health = this.maxHealth;
            this.speed = 1.5;
            this.phase = 'entering'; // entering, fighting, defeated
            this.shootTimer = 0;
            this.moveDirection = 1;
            this.moveTimer = 0;
            this.bossLevel = level;
        }
        
        update() {
            if (this.phase === 'entering') {
                this.y += this.speed;
                if (this.y >= this.targetY) {
                    this.y = this.targetY;
                    this.phase = 'fighting';
                }
                return;
            }
            
            if (this.phase === 'defeated') {
                this.y -= this.speed * 2;
                return;
            }
            
            // Movement
            this.moveTimer++;
            if (this.moveTimer > 60) {
                this.moveTimer = 0;
                this.moveDirection *= -1;
            }
            this.x += this.moveDirection * 2;
            this.x = Math.max(this.width / 2, Math.min(canvas.width - this.width / 2, this.x));
            
            // Shooting
            this.shootTimer--;
            if (this.shootTimer <= 0) {
                // Triple shot spread
                enemyBullets.push(new EnemyBullet(this.x, this.y + 40));
                enemyBullets.push(new EnemyBullet(this.x - 30, this.y + 40));
                enemyBullets.push(new EnemyBullet(this.x + 30, this.y + 40));
                this.shootTimer = 40 + Math.floor(Math.random() * 30);
            }
        }
        
        draw() {
            // === BOSS - massive warship ===
            {
                const t = Date.now();
                const pulse = Math.sin(t * 0.003) * 0.5 + 0.5;
                const x = this.x, y = this.y;

                ctx.save();

                // Outer aura
                ctx.shadowBlur = 25 + pulse * 15;
                ctx.shadowColor = '#cc0000';

                // === WINGS ===
                const wgL = ctx.createLinearGradient(x - 80, y, x, y);
                wgL.addColorStop(0, '#330000');
                wgL.addColorStop(1, '#880000');
                ctx.fillStyle = wgL;
                ctx.beginPath();
                ctx.moveTo(x - 22, y + 20);
                ctx.lineTo(x - 80, y + 30);
                ctx.lineTo(x - 85, y + 5);
                ctx.lineTo(x - 72, y - 22);
                ctx.lineTo(x - 22, y - 8);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#ff2200';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                const wgR = ctx.createLinearGradient(x, y, x + 80, y);
                wgR.addColorStop(0, '#880000');
                wgR.addColorStop(1, '#330000');
                ctx.fillStyle = wgR;
                ctx.beginPath();
                ctx.moveTo(x + 22, y + 20);
                ctx.lineTo(x + 80, y + 30);
                ctx.lineTo(x + 85, y + 5);
                ctx.lineTo(x + 72, y - 22);
                ctx.lineTo(x + 22, y - 8);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#ff2200';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Wing accent lines
                ctx.strokeStyle = 'rgba(255,80,0,0.4)';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(x - 24, y + 6); ctx.lineTo(x - 76, y + 14); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x + 24, y + 6); ctx.lineTo(x + 76, y + 14); ctx.stroke();

                // === WING CANNONS ===
                for (const wx of [-72, 72]) {
                    ctx.fillStyle = '#220000';
                    ctx.fillRect(x + wx - 5, y + 12, 10, 28);
                    ctx.strokeStyle = '#ff2200';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x + wx - 5, y + 12, 10, 28);
                    const cg = ctx.createRadialGradient(x + wx, y + 42, 1, x + wx, y + 42, 9);
                    cg.addColorStop(0, `rgba(255,150,0,${0.7 + pulse * 0.3})`);
                    cg.addColorStop(0.5, `rgba(255,40,0,${0.4 + pulse * 0.3})`);
                    cg.addColorStop(1, 'rgba(255,0,0,0)');
                    ctx.fillStyle = cg;
                    ctx.beginPath(); ctx.arc(x + wx, y + 42, 9, 0, Math.PI * 2); ctx.fill();
                }

                // === MAIN HULL ===
                const hull = ctx.createLinearGradient(x, y - 50, x, y + 50);
                hull.addColorStop(0, '#550000');
                hull.addColorStop(0.3, '#990000');
                hull.addColorStop(0.7, '#cc1100');
                hull.addColorStop(1, '#770000');
                ctx.fillStyle = hull;
                ctx.beginPath();
                ctx.moveTo(x, y + 52);
                ctx.lineTo(x - 18, y + 22);
                ctx.lineTo(x - 24, y - 5);
                ctx.lineTo(x - 16, y - 42);
                ctx.lineTo(x, y - 52);
                ctx.lineTo(x + 16, y - 42);
                ctx.lineTo(x + 24, y - 5);
                ctx.lineTo(x + 18, y + 22);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#ff3300';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Hull panel lines
                ctx.strokeStyle = 'rgba(255,60,0,0.25)';
                ctx.lineWidth = 1;
                for (const lx of [-8, 8]) {
                    ctx.beginPath(); ctx.moveTo(x + lx, y - 40); ctx.lineTo(x + lx, y + 40); ctx.stroke();
                }
                ctx.beginPath(); ctx.moveTo(x - 18, y + 5); ctx.lineTo(x + 18, y + 5); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x - 20, y - 15); ctx.lineTo(x + 20, y - 15); ctx.stroke();

                // === ENERGY CORE ===
                const core = ctx.createRadialGradient(x, y - 5, 2, x, y - 5, 20);
                core.addColorStop(0, `rgba(255,255,210,${0.85 + pulse * 0.15})`);
                core.addColorStop(0.25, `rgba(255,100,0,${0.8 + pulse * 0.2})`);
                core.addColorStop(0.6, `rgba(180,0,0,0.5)`);
                core.addColorStop(1, 'rgba(100,0,0,0)');
                ctx.fillStyle = core;
                ctx.beginPath(); ctx.arc(x, y - 5, 20, 0, Math.PI * 2); ctx.fill();

                ctx.fillStyle = `rgba(255,255,255,${0.7 + pulse * 0.3})`;
                ctx.beginPath(); ctx.arc(x, y - 5, 7, 0, Math.PI * 2); ctx.fill();

                ctx.shadowBlur = 0;
                ctx.restore();
            }
            
            // Health bar
            const barWidth = 200;
            const barHeight = 12;
            const barX = canvas.width / 2 - barWidth / 2;
            const barY = canvas.height - 60;
            
            // Background
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(barX - 2, barY - 2, barWidth + 4, barHeight + 4);
            
            // Health fill
            const healthPercent = this.health / this.maxHealth;
            const gradient = ctx.createLinearGradient(barX, 0, barX + barWidth, 0);
            gradient.addColorStop(0, '#ff0000');
            gradient.addColorStop(0.5, '#ff6600');
            gradient.addColorStop(1, '#00ff00');
            ctx.fillStyle = gradient;
            ctx.fillRect(barX, barY, barWidth * healthPercent, barHeight);
            
            // Border
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            ctx.strokeRect(barX, barY, barWidth, barHeight);
            
            // Label
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 12px Orbitron, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`BOSS - Nivel ${this.bossLevel}`, canvas.width / 2, barY - 8);
            ctx.fillText(`${Math.ceil(this.health)} / ${this.maxHealth}`, canvas.width / 2, barY + barHeight + 14);
        }
        
        hit(damage) {
            this.health -= damage;
            createParticles(this.x, this.y, 10, '#ff6600');
            screenShake(5, 8);

            if (this.health <= 0) {
                this.phase = 'defeated';
                // Massive explosion
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        createParticles(
                            this.x + (Math.random() - 0.5) * 80,
                            this.y + (Math.random() - 0.5) * 60,
                            30, '#ff6600'
                        );
                        playSound('explosion');
                    }, i * 150);
                }
                
                // Reward: points + rapid fire
                score += 1000 * this.bossLevel;
                floatingTexts.push(new FloatingText(this.x, this.y - 50, `+${1000 * this.bossLevel}`, '#ff6600'));
                activePowerUps.rapidFire = 600; // 10 seconds
                playSound('bossDefeat');
                
                // Hide boss after a moment
                setTimeout(() => {
                    boss = null;
                }, 800);
            }
        }
    }
    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 10;
            this.vy = (Math.random() - 0.5) * 10;
            this.life = 1;
            this.decay = 0.02 + Math.random() * 0.02;
            this.color = color;
            this.size = Math.random() * 4 + 2;
        }
        
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= this.decay;
            this.vx *= 0.98;
            this.vy *= 0.98;
        }
        
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }
    
    // ============ FLOATING TEXT ============
    class FloatingText {
        constructor(x, y, text, color = '#ffd93d') {
            this.x = x;
            this.y = y;
            this.text = text;
            this.color = color;
            this.life = 1;
            this.vy = -1.5;
        }
        update() {
            this.y += this.vy;
            this.life -= 0.022;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.font = 'bold 18px Orbitron, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(this.text, this.x, this.y);
            ctx.restore();
        }
    }

    // ============ POWER-UP CLASS ============
    class PowerUp {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.types = ['shield', 'doubleShot', 'rapidFire', 'speed'];
            this.type = this.types[Math.floor(Math.random() * this.types.length)];
            this.speed = 2;
            this.size = 25;
        }
        
        update() {
            this.y += this.speed;
        }
        
        draw() {
            const colors = {
                shield: '#00ffcc',
                doubleShot: '#ffd93d',
                rapidFire: '#ff6b6b',
                speed: '#a855f7'
            };

            ctx.save();
            ctx.fillStyle = colors[this.type];
            ctx.shadowBlur = 20;
            ctx.shadowColor = colors[this.type];
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();

            // Try to use image, fallback to emoji
            const assetName = this.type === 'doubleShot' ? 'doubleShot' :
                              this.type === 'rapidFire' ? 'life' :
                              this.type;
            if (assets[assetName] && assets[assetName].complete) {
                ctx.drawImage(assets[assetName], this.x - 15, this.y - 15, 30, 30);
            } else {
                const icons = {
                    shield: '🛡️',
                    doubleShot: '⚡',
                    rapidFire: '🔥',
                    speed: '💨'
                };
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 0;
                ctx.fillText(icons[this.type], this.x, this.y + 6);
            }
            ctx.restore();
        }
    }
    
    // ============ CREATE PARTICLES ============
    function createParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
            particles.push(new Particle(x, y, color));
        }
    }
    
    // ============ SPAWN ENEMY ============
    let spawnTimer = 0;
    let bossSpawnedThisLevel = false;
    let levelUpTimer = 0;
    function spawnEnemy() {
        // Spawn boss every 5 levels (if not already spawned)
        if (level % 5 === 0 && !bossSpawnedThisLevel && !boss && score >= level * 2000 - 100) {
            boss = new Boss(level);
            bossSpawnedThisLevel = true;
            return;
        }
        
        spawnTimer--;
        if (spawnTimer <= 0) {
            enemies.push(new Enemy());
            spawnTimer = difficultySettings[difficulty].spawnRate / 16.67;
        }
    }
    
    // ============ UPDATE UI ============
    function updateUI() {
        if (score !== _uiCache.score) { document.getElementById('score').textContent = score; _uiCache.score = score; }
        if (highScore !== _uiCache.highScore) { document.getElementById('highScore').textContent = highScore; _uiCache.highScore = highScore; }
        if (lives !== _uiCache.lives) { document.getElementById('lives').textContent = '❤️'.repeat(lives); _uiCache.lives = lives; }
        if (health !== _uiCache.health) { document.getElementById('healthFill').style.width = health + '%'; _uiCache.health = health; }
        
        // Power-up indicators
        const indicator = document.getElementById('powerUpIndicator');
        indicator.innerHTML = '';
        const puConfig = {
            shield:     { label: '🛡️', color: '#00ffcc' },
            doubleShot: { label: '⚡', color: '#ffd93d' },
            rapidFire:  { label: '🔥', color: '#ff6b6b' },
            speed:      { label: '💨', color: '#a855f7' }
        };
        for (const [key, cfg] of Object.entries(puConfig)) {
            if (activePowerUps[key] > 0) {
                const pct = Math.round((activePowerUps[key] / 300) * 100);
                indicator.innerHTML += `<div class="powerUp-icon" style="background:${cfg.color}22;border:1px solid ${cfg.color};position:relative;">${cfg.label}<div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(0,0,0,0.4);border-radius:0 0 50% 50%"><div style="width:${pct}%;height:100%;background:${cfg.color};border-radius:0 0 50% 50%;transition:width 0.1s"></div></div></div>`;
            }
        }
        
        // Update achievements display
        const achDiv = document.getElementById('achievements');
        achDiv.innerHTML = '';
        achievements.forEach(a => {
            achDiv.innerHTML += `<div class="achievement ${a.unlocked ? 'unlocked' : ''}" title="${a.name}">${a.icon}</div>`;
        });
    }
    
    // ============ CHECK ACHIEVEMENTS ============
    function checkAchievement(id) {
        const ach = achievements.find(a => a.id === id);
        if (ach && !ach.unlocked) {
            ach.unlocked = true;
            updateUI();
        }
    }
    
    // ============ SHOW COMBO ============
    function showCombo(count) {
        const comboDiv = document.getElementById('combo');
        if (count >= 5) {
            comboDiv.textContent = `COMBO x${count}!`;
            comboDiv.style.opacity = 1;
            comboDiv.style.animation = 'pulse 0.3s';
            setTimeout(() => {
                comboDiv.style.opacity = 0;
            }, 500);
        }

    // ============ GAME OVER ============
    function gameOver() {
        gameRunning = false;
        playSound('gameover');
        
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('naveEstelarHighScore', highScore);
        }
        
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('gameStats').style.display = 'block';
        document.getElementById('finalScore').textContent = score;
        document.getElementById('finalLevel').textContent = level;
        document.getElementById('finalKills').textContent = kills;
        
        // Reset achievements for new game
        achievements.forEach(a => a.unlocked = false);
    }
    
    // ============ DIFFICULTY SELECTION ============
    function selectDifficulty(diff) {
        difficulty = diff;
        document.querySelectorAll('#overlay .difficulty button').forEach(btn => {
            btn.classList.remove('selected');
        });
        const labels = { easy: 'FÁCIL', normal: 'NORMAL', hard: 'DIFÍCIL' };
        document.querySelectorAll('#overlay .difficulty button').forEach(btn => {
            if (btn.textContent.trim() === labels[diff]) btn.classList.add('selected');
        });
    }

    // ============ START GAME ============
    function startGame(diff = 'normal') {
        difficulty = diff;
        score = 0;
        lives = 3;
        health = 100;
        level = 1;
        kills = 0;
        combo = 0;
        
        player = new Player();
        bullets = [];
        enemies = [];
        particles = [];
        powerUps = [];
        enemyBullets = [];
        floatingTexts = [];
        
        activePowerUps = { shield: 0, doubleShot: 0, rapidFire: 0, speed: 0 };
        
        initStars();
        initAudio(); // Initialize audio system
        
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('gameStats').style.display = 'none';
        
        bossSpawnedThisLevel = false;
        levelUpTimer = 0;
        gamePaused = false;
        boss = null;

        gameRunning = true;
        gameLoop();
    }
    
    // ============ GAME LOOP ============
    function gameLoop() {
        if (!gameRunning) return;
        if (gamePaused) return;
        
        // Clear
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Screen shake transform
        ctx.save();
        if (shakeFrames > 0) {
            ctx.translate(
                (Math.random() - 0.5) * shakeIntensity,
                (Math.random() - 0.5) * shakeIntensity
            );
            shakeFrames--;
        }

        // Background con parallax
        if (assets['background'] && assets['background'].complete) {
            bgOffset = (bgOffset + 1.5) % canvas.height;
            // Dibujar imagen dos veces para efecto continuo de parallax
            ctx.drawImage(assets['background'], 0, bgOffset - canvas.height, canvas.width, canvas.height);
            ctx.drawImage(assets['background'], 0, bgOffset, canvas.width, canvas.height);
        } else {
            // Fallback: dibujar estrellas
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
                const starColors = ['255,255,255', '180,200,255', '255,240,180', '255,200,200'];
                ctx.fillStyle = `rgba(${starColors[star.colorIndex] || '255,255,255'},${star.brightness})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        // Update player
        player.update();
        player.draw();
        
        // Update and draw Boss
        if (boss) {
            boss.update();
            boss.draw();
        }
        
        // Spawn enemies
        spawnEnemy();
        
        // Update bullets
        bullets = bullets.filter(b => b.y > -20);
        bullets.forEach(b => {
            b.update();
            b.draw();
        });
        
        // Update enemies
        enemies = enemies.filter(e => e.y < canvas.height + 50);
        enemies.forEach(e => {
            e.update();
            e.draw();
            
            // Collision with player
            if (Math.abs(e.x - player.x) < 30 && Math.abs(e.y - player.y) < 30) {
                player.hit(30);
                e.health = 0;
            }
        });
        
        // Collision detection
        bullets.forEach((b, bi) => {
            enemies.forEach((e, ei) => {
                if (Math.abs(b.x - e.x) < 25 && Math.abs(b.y - e.y) < 25) {
                    e.health--;
                    bullets.splice(bi, 1);
                    createParticles(b.x, b.y, 5, '#00ffcc');
                    
                    if (e.health <= 0) {
                        // Enemy destroyed - spawn explosion
                        explosions.push({ x: e.x, y: e.y, life: 20, maxLife: 20 });
                        createParticles(e.x, e.y, 15, e.type === 'asteroid' ? '#666' : '#ff4444');
                        
                        // Score
                        const points = e.type === 'fighter' ? 250 : 100;
                        score += points;
                        kills++;
                        
                        // Combo
                        combo++;
                        comboTimer = 60;
                        if (combo >= 5) showCombo(combo);
                        
                        // Check achievements
                        if (kills === 1) checkAchievement('firstKill');
                        if (combo >= 5) checkAchievement('combo5');
                        if (combo >= 10) checkAchievement('combo10');
                        if (score >= 1000) checkAchievement('score1000');
                        if (score >= 5000) checkAchievement('score5000');
                        
                        // Drop power-up
                        if (Math.random() < 0.18) {
                            powerUps.push(new PowerUp(e.x, e.y));
                        }
                        
                        floatingTexts.push(new FloatingText(e.x, e.y, `+${points}`));
                        enemies.splice(ei, 1);
                        playSound('explosion');

                        // Level up
                        if (score > level * 2000) {
                            level++;
                            levelUpTimer = 150;
                            bossSpawnedThisLevel = false; // Reset for new level
                        }
                    }
                }
            });
        });
        
        // Boss collision (bullets vs boss)
        if (boss && boss.phase === 'fighting') {
            bullets.forEach((b, bi) => {
                if (Math.abs(b.x - boss.x) < 60 && Math.abs(b.y - boss.y) < 50) {
                    bullets.splice(bi, 1);
                    boss.hit(20 + level * 2);
                    createParticles(b.x, b.y, 8, '#ff6600');
                    playSound('hit');
                }
            });
            
            // Player touching boss body
            if (Math.abs(player.x - boss.x) < 80 && Math.abs(player.y - boss.y) < 70) {
                player.hit(25);
            }
        }
        
        // Update enemy bullets
        enemyBullets = enemyBullets.filter(b => b.y < canvas.height + 20);
        enemyBullets.forEach(b => {
            b.update();
            b.draw();
            
            // Collision with player
            if (Math.abs(b.x - player.x) < 20 && Math.abs(b.y - player.y) < 20) {
                player.hit(15);
                enemyBullets.splice(enemyBullets.indexOf(b), 1);
            }
        });
        
        // Update power-ups
        powerUps = powerUps.filter(p => p.y < canvas.height + 30);
        powerUps.forEach(p => {
            p.update();
            p.draw();
            
            // Collision with player
            if (Math.abs(p.x - player.x) < 35 && Math.abs(p.y - player.y) < 35) {
                activePowerUps[p.type] = 300; // 5 seconds
                powerUps.splice(powerUps.indexOf(p), 1);
                score += 50;
                playSound('powerup');
            }
        });
        
        // Update particles
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => {
            p.update();
            p.draw();
        });

        // Draw explosions
        explosions = explosions.filter(exp => exp.life > 0);
        explosions.forEach(exp => {
            exp.life--;
            const scale = 1 + (1 - exp.life / exp.maxLife) * 0.5;
            const alpha = exp.life / exp.maxLife;

            if (assets['explosion'] && assets['explosion'].complete) {
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.drawImage(
                    assets['explosion'],
                    exp.x - 20 * scale,
                    exp.y - 20 * scale,
                    40 * scale,
                    40 * scale
                );
                ctx.restore();
            } else {
                // Fallback: partículas de explosión
                ctx.fillStyle = `rgba(255,150,50,${alpha})`;
                ctx.beginPath();
                ctx.arc(exp.x, exp.y, 20 * scale * alpha, 0, Math.PI * 2);
                ctx.fill();
            }
        });
        
        // Floating texts
        floatingTexts = floatingTexts.filter(t => t.life > 0);
        floatingTexts.forEach(t => { t.update(); t.draw(); });

        // Level up announcement
        if (levelUpTimer > 0) {
            const alpha = Math.min(1, levelUpTimer / 40);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.font = 'bold 52px Orbitron, sans-serif';
            ctx.textAlign = 'center';
            ctx.shadowBlur = 40;
            ctx.shadowColor = '#ffd93d';
            ctx.fillStyle = '#ffd93d';
            ctx.fillText(`NIVEL ${level}`, canvas.width / 2, canvas.height / 2 - 20);
            ctx.font = '22px Orbitron, sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = '#ffffff';
            ctx.fillText('¡SUBIDA DE NIVEL!', canvas.width / 2, canvas.height / 2 + 20);
            ctx.restore();
            levelUpTimer--;
        }

        // Combo timer
        if (comboTimer > 0) {
            comboTimer--;
        } else {
            combo = 0;
        }

        // Update UI
        updateUI();
        
        ctx.restore(); // end screen shake

        requestAnimationFrame(gameLoop);
    }

    // ============ CONTROLS ============
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && gameRunning) {
            gamePaused = !gamePaused;
            if (gamePaused) {
                // Draw pause overlay on canvas
                ctx.fillStyle = 'rgba(5,5,16,0.75)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.save();
                ctx.font = 'bold 56px Orbitron, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#00ffcc';
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#00ffcc';
                ctx.fillText('PAUSA', canvas.width / 2, canvas.height / 2 - 10);
                ctx.font = '20px Orbitron, sans-serif';
                ctx.fillStyle = '#888';
                ctx.shadowBlur = 0;
                ctx.fillText('Presiona ESC para continuar', canvas.width / 2, canvas.height / 2 + 40);
                ctx.restore();
            } else {
                requestAnimationFrame(gameLoop);
            }
            return;
        }
        keys[e.key] = true;
    });
    document.addEventListener('keyup', e => {
        keys[e.key] = false;
    });
    
    // Touch controls
    document.getElementById('leftBtn').addEventListener('touchstart', () => touchLeft = true);
    document.getElementById('leftBtn').addEventListener('touchend', () => touchLeft = false);
    document.getElementById('rightBtn').addEventListener('touchstart', () => touchRight = true);
    document.getElementById('rightBtn').addEventListener('touchend', () => touchRight = false);
    document.getElementById('shootBtn').addEventListener('touchstart', () => touchShoot = true);
    document.getElementById('shootBtn').addEventListener('touchend', () => touchShoot = false);
    
    // Mouse controls (for testing on PC)
    document.getElementById('leftBtn').addEventListener('mousedown', () => touchLeft = true);
    document.getElementById('leftBtn').addEventListener('mouseup', () => touchLeft = false);
    document.getElementById('rightBtn').addEventListener('mousedown', () => touchRight = true);
    document.getElementById('rightBtn').addEventListener('mouseup', () => touchRight = false);
    document.getElementById('shootBtn').addEventListener('mousedown', () => touchShoot = true);
    document.getElementById('shootBtn').addEventListener('mouseup', () => touchShoot = false);
    
    // Initialize
    initStars();
    updateUI();
    preloadAssets(() => console.log('Assets loaded'));
    
    // Init audio on first interaction (autoplay policy)
    document.addEventListener('click', () => initAudio(), { once: true });
    document.addEventListener('touchstart', () => initAudio(), { once: true });
    </script>
</body>
</html>
